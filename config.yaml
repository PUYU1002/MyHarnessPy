# ----------------------------------------------------------------------
# Third-party API configuration
# 361API uses an OpenAI-compatible interface.
# Put keys in .env or system environment variables:
#   THREE_SIX_ONE_API_KEY=sk-...
# Compatible aliases such as BLTCY_API_KEY and OPENAI_API_KEY are also accepted.
# HARNESS_DEFAULT_PROVIDER supports the legacy alias my-361api.
# ----------------------------------------------------------------------

default_provider: 361api-openai

providers:
  # Primary OpenAI-compatible provider via 361API
  361api-openai:
    name: openai-compatible
    model: gpt-4o
    api_key: "${THREE_SIX_ONE_API_KEY}"
    api_key_env:
      - THREE_SIX_ONE_API_KEY
      - THREESIXONE_API_KEY
      - API_361_KEY
      - 361API_API_KEY
      - OPENAI_API_KEY
      - BLTCY_API_KEY
    base_url: "https://www.361api.com/v1"
    max_tokens: 4096
    temperature: 0.0

  # Lower-cost summarization model for compression
  361api-mini:
    name: openai-compatible
    model: gpt-4o-mini
    api_key: "${THREE_SIX_ONE_API_KEY}"
    api_key_env:
      - THREE_SIX_ONE_API_KEY
      - THREESIXONE_API_KEY
      - API_361_KEY
      - 361API_API_KEY
      - OPENAI_API_KEY
      - BLTCY_API_KEY
    base_url: "https://www.361api.com/v1"
    max_tokens: 2048
    temperature: 0.0

  # Legacy provider alias compatibility
  my-361api:
    name: openai-compatible
    model: gpt-4o
    api_key: "${THREE_SIX_ONE_API_KEY}"
    api_key_env:
      - THREE_SIX_ONE_API_KEY
      - THREESIXONE_API_KEY
      - API_361_KEY
      - 361API_API_KEY
      - OPENAI_API_KEY
      - BLTCY_API_KEY
    base_url: "https://www.361api.com/v1"
    max_tokens: 4096
    temperature: 0.0

  bltcy-anthropic:
    name: anthropic
    model: claude-sonnet-4-6
    api_key: "${BLTCY_API_KEY}"
    base_url: "https://api.bltcy.ai"
    max_tokens: 8192
    temperature: 0.0
    extra:
      thinking:
        enabled: true

  bltcy-openai:
    name: openai-compatible
    model: gpt-4o
    api_key: "${BLTCY_API_KEY}"
    base_url: "https://api.bltcy.ai/v1"
    max_tokens: 4096
    temperature: 0.0

  bltcy-mini:
    name: openai-compatible
    model: gpt-4o-mini
    api_key: "${BLTCY_API_KEY}"
    base_url: "https://api.bltcy.ai/v1"
    max_tokens: 2048
    temperature: 0.0

engine:
  max_rounds: 50

compression:
  token_window: 128000
  auto_trigger_ratio: 0.65
  micro_keep_recent: 6
  summary_provider: 361api-mini

storage:
  backend: sqlite
  path: ./harness.db

tools:
  enabled:
    - read_file
    - write_file
    - edit_file
    - search
    - shell
    - glob
    - grep
    - powershell
    - web_fetch
    - web_search
    - think
    - todo_write

  confirm_tools:
    - shell
    - powershell

  limits:
    read_file: 20000
    search: 10000
    shell: 15000
    web_fetch: 8000
    web_search: 8000
    todo_write: 5000

mcp_servers:
  filesystem:
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "."]
