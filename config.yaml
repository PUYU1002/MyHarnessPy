# ----------------------------------------------------------------------
# Third-party API configuration
# OpenAI-Hub (https://www.openai-hub.com/) is an OpenAI-compatible relay.
# Put keys in .env or system environment variables:
#   OPENAI_HUB_API_KEY=sk-...
#   OPENAI_HUB_BASE_URL=https://api.openai-hub.com/v1
#   OPENAI_HUB_MODEL=gpt-4o
# HARNESS_DEFAULT_PROVIDER supports the alias hub-openai.
# ----------------------------------------------------------------------

default_provider: openai-hub

providers:
  # OpenAI-Hub OpenAI-compatible provider
  openai-hub:
    name: openai-compatible
    model: "${OPENAI_HUB_MODEL:-gpt-4o}"
    api_key: "${OPENAI_HUB_API_KEY}"
    api_key_env:
      - OPENAI_HUB_API_KEY
      - OPENAIHUB_API_KEY
      - HUB_OPENAI_API_KEY
    base_url: "${OPENAI_HUB_BASE_URL:-https://api.openai-hub.com/v1}"
    max_tokens: 4096
    temperature: 0.0

  # Lower-cost summarization model for compression
  openai-hub-mini:
    name: openai-compatible
    model: "${OPENAI_HUB_MODEL_MINI:-gpt-4o-mini}"
    api_key: "${OPENAI_HUB_API_KEY}"
    api_key_env:
      - OPENAI_HUB_API_KEY
      - OPENAIHUB_API_KEY
      - HUB_OPENAI_API_KEY
    base_url: "${OPENAI_HUB_BASE_URL:-https://api.openai-hub.com/v1}"
    max_tokens: 2048
    temperature: 0.0

engine:
  max_rounds: 50

compression:
  token_window: 128000
  auto_trigger_ratio: 0.65
  micro_keep_recent: 6
  summary_provider: openai-hub-mini

storage:
  backend: sqlite
  path: ./harness.db

tools:
  enabled:
    - read_file
    - write_file
    - edit_file
    - search
    - shell
    - glob
    - grep
    - powershell
    - web_fetch
    - web_search
    - think
    - todo_write

  confirm_tools:
    - shell
    - powershell

  limits:
    read_file: 20000
    search: 10000
    shell: 15000
    web_fetch: 8000
    web_search: 8000
    todo_write: 5000

mcp_servers:
  filesystem:
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "."]
  # figma:
  #   transport: http
  #   url: "${FIGMA_MCP_URL}"
  #   headers:
  #     Authorization: "${FIGMA_MCP_AUTH}"
