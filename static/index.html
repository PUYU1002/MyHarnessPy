    function appendOptimisticUserMessage(text) {
      const container = document.getElementById('messages');
      if (!container) return;
      const el = div('msg user');
      el.dataset.pending = 'true';
      el.dataset.pendingText = text;
      el.innerHTML = `<div class="msg-role">You</div><div class="msg-bubble">${escHtml(text).replace(/\n/g, '<br>')}</div>`;
      const dots = document.getElementById('typing-dots');
      if (dots) container.insertBefore(el, dots);
      else container.appendChild(el);
      container.scrollTop = container.scrollHeight;
      pendingUserEchoes.push(text);
    }

    function rollbackOptimisticUserMessage(text) {
      const container = document.getElementById('messages');
      if (!container) return;
      const pendingEls = Array.from(container.querySelectorAll('.msg.user[data-pending="true"]'));
      const target = pendingEls.findLast
        ? pendingEls.findLast(el => el.dataset.pendingText === text)
        : [...pendingEls].reverse().find(el => el.dataset.pendingText === text);
      if (target) target.remove();
      const idx = pendingUserEchoes.lastIndexOf(text);
      if (idx >= 0) pendingUserEchoes.splice(idx, 1);
    }

    function reconcileOptimisticUserMessage(text) {
      if (!pendingUserEchoes.length) return false;
      if (pendingUserEchoes[0] !== text) return false;
      const container = document.getElementById('messages');
      if (!container) return false;
      const el = container.querySelector('.msg.user[data-pending="true"]');
      if (!el) return false;
      el.dataset.pending = 'false';
      delete el.dataset.pendingText;
      pendingUserEchoes.shift();
      return true;
    }

    // ── Config Panel ──────────────────────────────────────────────────────
    function toggleConfig() {
      const panel = document.getElementById('config-panel');
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) buildConfigTree();
    }

    async function buildConfigTree() {
      const tree = document.getElementById('config-tree');
      tree.innerHTML = '';

      // Skills
      tree.appendChild(div('tree-folder', '📁 skills/'));
      try {
        const r = await api('/config/skills');
        (r.skills || []).forEach(s => {
          const row = treeFileRow(s.name, () => loadConfigFile('skill', s.name));
          row.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); confirmDeleteConfig('skill', s.name); };
          tree.appendChild(row);
        });
      } catch (e) { }
      tree.appendChild(addNewRow('skill'));

      // Personas
      tree.appendChild(div('tree-folder', '📁 personas/'));
      try {
        const r = await api('/config/personas');
        (r.personas || []).forEach(p => {
          const name = typeof p === 'string' ? p : p.name;
          const row = treeFileRow(name, () => loadConfigFile('persona', name));
          row.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); confirmDeleteConfig('persona', name); };
          tree.appendChild(row);
        });
      } catch (e) { }
      tree.appendChild(addNewRow('persona'));

      // config.yaml
      tree.appendChild(div('tree-folder', '📄 config.yaml'));
      const yamlRow = treeFileRow('config.yaml', () => loadConfigFile('yaml', 'config.yaml'));
      yamlRow.querySelector('.del-btn').remove();
      tree.appendChild(yamlRow);
    }

    function treeFileRow(name, onclick) {
      const row = document.createElement('div');
      row.className = 'tree-file';
      row.innerHTML = `<span>📄 ${escHtml(name)}</span><span class="del-btn" title="删除">✕</span>`;
      row.addEventListener('click', onclick);
      return row;
    }

    function addNewRow(type) {
      const wrap = div('tree-new');
      const inp = document.createElement('input');
      inp.type = 'text'; inp.placeholder = '新建名称…';
      const btn = div('', '＋');
      btn.className = 'btn btn-sm btn-primary';
      btn.style.padding = '2px 8px';
      btn.onclick = async () => {
        const name = inp.value.trim();
        if (!name) return;
        const tmpl = type === 'skill'
          ? `---\nname: ${name}\ndescription: "${name}"\nprovider: bltcy-anthropic\ntask_goal: ""\ntools:\n  - read_file\n  - search\n---\n\n你是一个...`
          : '你是一个...\n\n回答时用中文。';
        try {
          if (type === 'skill') await api('/config/skills', 'POST', { name, content: tmpl });
          else await api('/config/personas', 'POST', { name, content: tmpl });
          toast(`${name} 已创建`);
          inp.value = '';
          buildConfigTree();
          await loadConfigFile(type, name);
          await loadOverview();
        } catch (e) { toast(e.message, true); }
      };
      wrap.appendChild(inp); wrap.appendChild(btn);
      return wrap;
    }

    async function loadConfigFile(type, name) {
      // Highlight active
      document.querySelectorAll('.tree-file').forEach(el => {
        const txt = el.querySelector('span')?.textContent;
        el.classList.toggle('active', txt === `📄 ${name}` || txt === `📄 ${name}`);
      });

      currentConfigFile = { type, name };
      document.getElementById('config-filename').textContent = type === 'yaml' ? 'config.yaml' : `${type === 'skill' ? 'skills' : 'personas'}/${name}.md`;
      document.getElementById('config-filename').style.color = 'var(--accent)';
      document.getElementById('config-editor').disabled = false;
      document.getElementById('config-save-btn').disabled = false;
      document.getElementById('config-del-btn').disabled = type === 'yaml';
      document.getElementById('config-status').textContent = '';

      try {
        let r;
        if (type === 'skill') r = await api(`/config/skills/${name}`);
        else if (type === 'persona') r = await api(`/config/personas/${name}`);
        else r = await api('/config/yaml');
        document.getElementById('config-editor').value = r.content || '';
      } catch (e) { toast('加载失败: ' + e.message, true); }
    }

    async function saveConfigFile() {
      if (!currentConfigFile) return;
      const { type, name } = currentConfigFile;
      const content = document.getElementById('config-editor').value;
      try {
        if (type === 'skill') await api(`/config/skills/${name}`, 'PUT', { content });
        else if (type === 'persona') await api(`/config/personas/${name}`, 'PUT', { content });
        else await api('/config/yaml', 'PUT', { content });
        document.getElementById('config-status').textContent = '✓ 已保存';
        setTimeout(() => document.getElementById('config-status').textContent = '', 2000);
        await loadOverview();
        await buildConfigTree();
      } catch (e) { toast('保存失败: ' + e.message, true); }
    }

    async function confirmDeleteConfig(type, name) {
      if (!await showConfirm('删除文件', `确认删除「${name}」？此操作不可恢复。`)) return;
      try {
        if (type === 'skill') await api(`/config/skills/${name}`, 'DELETE');
        else await api(`/config/personas/${name}`, 'DELETE');
        toast(`${name} 已删除`);
        currentConfigFile = null;
        document.getElementById('config-editor').value = '';
        document.getElementById('config-editor').disabled = true;
        document.getElementById('config-save-btn').disabled = true;
        document.getElementById('config-del-btn').disabled = true;
        document.getElementById('config-filename').textContent = '← 选择文件编辑';
        document.getElementById('config-filename').style.color = 'var(--text-muted)';
        await loadOverview();
        buildConfigTree();
      } catch (e) { toast('删除失败: ' + e.message, true); }
    }

    async function deleteConfigFile() {
      if (!currentConfigFile || currentConfigFile.type === 'yaml') return;
      confirmDeleteConfig(currentConfigFile.type, currentConfigFile.name);
    }

    // ── Utilities ─────────────────────────────────────────────────────────
    async function api(path, method = 'GET', body = null) {
      const opts = { method, headers: {} };
      if (body !== null) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      const r = await fetch(path, opts);
      if (r.status === 204) return null;
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || r.statusText);
      return data;
    }

    function div(cls, text = '') {
      const el = document.createElement('div');
      if (cls) el.className = cls;
      if (text) el.textContent = text;
      return el;
    }

    async function copyToClipboard(text, btn) {
      try {
        await navigator.clipboard.writeText(text);
        if (btn) {
          btn.textContent = '✓';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500);
        }
      } catch {
        // Fallback for older browsers
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        if (btn) {
          btn.textContent = '✓';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500);
        }
      }
    }

    function copyCodeBlock(btn) {
      const pre = btn.parentElement.querySelector('pre');
      if (pre) copyToClipboard(pre.textContent, btn);
    }

    function copyMessageBubble(btn) {
      const bubble = btn.closest('.msg').querySelector('.msg-bubble');
      if (bubble) copyToClipboard(bubble.textContent, btn);
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function mdToHtml(md) {
      // Very light markdown: bold, inline code, code blocks, lists
      // Phase 1: protect code blocks so their content is not touched by escHtml / <br>
      const blocks = [];
      let h = md.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        blocks.push(escHtml(code.trimEnd()));
        return `\x00CB${blocks.length - 1}\x00`;
      });
      // Phase 2: escape remaining text
      h = escHtml(h);
      // Phase 3: inline formatting
      h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
      h = h.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/^### (.*?)$/gm, '<strong>$1</strong>');
      h = h.replace(/^## (.*?)$/gm, '<strong style="font-size:1.05em">$1</strong>');
      h = h.replace(/^# (.*?)$/gm, '<strong style="font-size:1.1em">$1</strong>');
      // unordered list
      h = h.replace(/^[- *] (.*?)$/gm, '<li>$1</li>');
      h = h.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
      // Phase 4: paragraphs (skip already-html blocks and code block placeholders)
      h = h.split('\n\n').map(p => {
        p = p.trim();
        if (!p) return '';
        if (p.startsWith('<') || p.startsWith('\x00CB')) return p;
        return `<p>${p.replace(/\n/g, '<br>')}</p>`;
      }).join('');
      // Phase 5: restore code blocks with copy button
      h = h.replace(/\x00CB(\d+)\x00/g, (_, i) => {
        const code = blocks[+i];
        return `<div class="code-block"><button class="copy-btn" title="复制" onclick="copyCodeBlock(this)">📋</button><pre><code>${code}</code></pre></div>`;
      });
      return h;
    }

    function showConfirm(title, message) {
      return new Promise((resolve) => {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-message').textContent = message;
        const overlay = document.getElementById('confirm-overlay');
        overlay.classList.remove('hidden');
        const cleanup = (result) => {
          overlay.classList.add('hidden');
          resolve(result);
        };
        document.getElementById('confirm-ok-btn').onclick = () => cleanup(true);
        document.getElementById('confirm-cancel-btn').onclick = () => cleanup(false);
        overlay.onclick = (e) => { if (e.target === overlay) cleanup(false); };
      });
    }

    function toast(msg, isErr = false) {
      const el = document.createElement('div');
      el.className = 'toast ' + (isErr ? 'toast-err' : 'toast-ok');
      el.textContent = msg;
      document.getElementById('toasts').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // Close modal on overlay click
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    // ── Command Bar ────────────────────────────────────────────────────────

    async function fetchCommands() {
      try {
        const res = await fetch('/commands');
        if (res.ok) {
          const data = await res.json();
          allCommands = data.commands || [];
        }
      } catch (e) { /* server may not be ready yet */ }
    }

    let _cmdBarCloseTimer = null;

    function showCommandBar(initialSearch) {
      const bar = document.getElementById('cmd-bar');
      // Toggle: if already open, close it
      if (bar && bar.classList.contains('visible')) {
        hideCommandBar();
        return;
      }
      const inp = document.getElementById('cmd-search-bar');
      if (!bar || !inp) return;
      bar.classList.add('visible');
      inp.value = initialSearch ? initialSearch.replace(/^\//, '') : '';
      inp.focus();
      filterCommands();
      // Close when clicking outside (delay to skip the trigger click)
      clearTimeout(_cmdBarCloseTimer);
      _cmdBarCloseTimer = setTimeout(() => {
        document.addEventListener('click', _onDocClick);
      }, 50);
    }

    function hideCommandBar() {
      const bar = document.getElementById('cmd-bar');
      if (bar) bar.classList.remove('visible');
      document.removeEventListener('click', _onDocClick);
      document.getElementById('msg-input').focus();
    }

    function _onDocClick(e) {
      const bar = document.getElementById('cmd-bar');
      // Close if clicked outside the command bar
      if (bar && !bar.contains(e.target)) {
        hideCommandBar();
      }
    }

    function filterCommands() {
      const query = (document.getElementById('cmd-search-bar').value || '').toLowerCase();
      filteredCommands = allCommands.filter(c => {
        if (c.id === 'exit') return false;
        const searchStr = (c.id + ' ' + c.title + ' ' + c.description).toLowerCase();
        return searchStr.includes(query);
      });
      selectedCmdIndex = filteredCommands.length > 0 ? 0 : -1;
      renderCommandBarList();
    }

    function renderCommandBarList() {
      const container = document.getElementById('cmd-bar-list');
      if (!container) return;
      if (filteredCommands.length === 0) {
        container.innerHTML = '<div style="color:var(--text-muted);padding:8px">无匹配命令</div>';
        return;
      }
      container.innerHTML = filteredCommands.map((c, i) => {
        const badge = c.has_params
          ? `<span class="cmd-bar-badge">参数: ${c.params.join(', ')}</span>`
          : '';
        const src = c.source === 'project'
          ? '<span class="cmd-bar-badge project">项目</span>'
          : '';
        const sel = i === selectedCmdIndex ? ' selected' : '';
        return `<div class="cmd-bar-item${sel}" data-index="${i}"
          onmousedown="fillCommand(${i})">
          <span class="cmd-bar-name">/${c.id}</span>
          <span class="cmd-bar-title">${c.title}</span>
          ${badge}${src}
        </div>`;
      }).join('');
    }

    function handleCmdKey(event) {
      if (event.key === 'Escape') {
        event.preventDefault();
        hideCommandBar();
        return;
      }
      if (event.key === 'ArrowDown') {
        event.preventDefault();
        if (selectedCmdIndex < filteredCommands.length - 1) {
          selectedCmdIndex++;
          renderCommandBarList();
          scrollCmdBarIntoView();
        }
      }
      if (event.key === 'ArrowUp') {
        event.preventDefault();
        if (selectedCmdIndex > 0) {
          selectedCmdIndex--;
          renderCommandBarList();
          scrollCmdBarIntoView();
        }
      }
      if (event.key === 'Enter') {
        event.preventDefault();
        if (selectedCmdIndex >= 0 && selectedCmdIndex < filteredCommands.length) {
          fillCommand(selectedCmdIndex);
        }
      }
    }

    function scrollCmdBarIntoView() {
      const el = document.querySelector('#cmd-bar-list .cmd-bar-item.selected');
      if (el) el.scrollIntoView({ block: 'nearest' });
    }

    function fillCommand(index) {
      if (index < 0 || index >= filteredCommands.length) return;
      const cmd = filteredCommands[index];
      const inp = document.getElementById('msg-input');
      // Build command text: /id with param placeholders as hints
      let text = '/' + cmd.id;
      inp.value = text;
      hideCommandBar();
      // Delay to let mousedown event settle before focusing
      setTimeout(() => {
        inp.focus();
        inp.setSelectionRange(inp.value.length, inp.value.length);
      }, 10);
    }

    async function executeCommand(cmdId, args) {
      if (!cmdId || !currentSessionId) return;
      try {
        const res = await fetch(`/sessions/${currentSessionId}/commands/${encodeURIComponent(cmdId)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ args }),
        });
        const data = await res.json();
        if (data.sent) {
          stopPolling();
          connectWS(currentSessionId);
          document.getElementById('cancel-btn').classList.remove('hidden');
        }
        if (data.kind === 'internal' && data.message) {
          appendSystemMessage(data.message);
        }
      } catch (e) {
        toast('命令执行失败: ' + e.message, true);
      }
    }

    function appendSystemMessage(text) {
      const container = document.getElementById('messages');
      if (!container) return;
      const div = document.createElement('div');
      div.className = 'message system';
      div.style.cssText = 'padding:10px 16px;color:var(--text-muted);font-size:13px;white-space:pre-wrap;font-family:var(--mono)';
      div.textContent = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    // ── Start ──────────────────────────────────────────────────────────────
    boot();
  </script>
</body>

</html>
