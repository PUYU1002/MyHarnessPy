<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyHarnessPy</title>
  <style>
    /* ── Reset & Variables ────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f3a5f;
      --green: #3fb950;
      --green-dim: #0d2a18;
      --yellow: #d29922;
      --yellow-dim: #2d2208;
      --red: #f85149;
      --red-dim: #2d1118;
      --tool-bg: #1c2128;
      --user-bg: #1f3a5f;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
    }

    /* ── Layout ───────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 48px;
      min-height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #topbar h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .02em;
      color: var(--text);
    }

    #topbar h1 span {
      color: var(--accent);
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* sidebar */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .sidebar-section {
      padding: 4px 0 8px;
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 8px 14px 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      cursor: pointer;
      transition: background .12s;
      border-radius: 0;
      color: var(--text-muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .sidebar-item.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .sidebar-item .badge {
      margin-left: auto;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .badge-run {
      background: var(--green-dim);
      color: var(--green);
    }

    .badge-done {
      background: var(--surface2);
      color: var(--text-muted);
    }

    .badge-err {
      background: var(--red-dim);
      color: var(--red);
    }

    .badge-wait {
      background: var(--yellow-dim);
      color: var(--yellow);
    }

    #sidebar-bottom {
      border-top: 1px solid var(--border);
      padding: 8px;
    }

    /* chat area */
    #chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    #session-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      background: var(--surface);
      min-height: 44px;
    }

    #session-header .meta {
      color: var(--text-muted);
      font-size: 12px;
    }

    #session-header .meta strong {
      color: var(--accent);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #input-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--surface);
    }

    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      min-height: 38px;
      max-height: 120px;
      outline: none;
      line-height: 1.5;
      transition: border-color .15s;
    }

    #msg-input:focus {
      border-color: var(--accent);
    }

    /* config panel */
    #config-panel {
      width: 360px;
      min-width: 360px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #config-panel.open {
      display: flex;
    }

    #config-panel-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    #config-tree {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      overflow-y: auto;
      max-height: 220px;
      flex-shrink: 0;
    }

    .tree-folder {
      padding: 4px 14px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: .04em;
    }

    .tree-file {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 14px 4px 26px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      transition: background .1s;
    }

    .tree-file:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .tree-file.active {
      color: var(--accent);
      background: var(--accent-dim);
    }

    .tree-file .del-btn {
      opacity: 0;
      font-size: 11px;
      color: var(--red);
      cursor: pointer;
      padding: 0 4px;
    }

    .tree-file:hover .del-btn {
      opacity: 1;
    }

    .tree-new {
      padding: 3px 14px 3px 26px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .tree-new input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 7px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }

    .tree-new input:focus {
      border-color: var(--accent);
    }

    #config-editor-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #config-filename {
      padding: 8px 14px 4px;
      font-size: 12px;
      color: var(--accent);
      font-family: var(--mono);
      flex-shrink: 0;
    }

    #config-editor {
      flex: 1;
      background: var(--bg);
      border: none;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12.5px;
      padding: 12px 14px;
      resize: none;
      outline: none;
      line-height: 1.6;
    }

    #config-actions {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Message Bubbles ──────────────────────────────────────────────── */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 80%;
    }

    .msg.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg.assistant,
    .msg.tool {
      align-self: flex-start;
      align-items: flex-start;
    }

    .msg-role {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 0 4px;
    }

    .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      line-height: 1.6;
      max-width: 100%;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border-color: var(--accent-dim);
    }

    /* markdown in bubbles */
    .msg-bubble p {
      margin-bottom: 6px;
    }

    .msg-bubble p:last-child {
      margin-bottom: 0;
    }

    .msg-bubble code {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: var(--mono);
      font-size: 12.5px;
      color: var(--accent);
    }

    .msg-bubble pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 6px 0;
    }

    .msg-bubble pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: 12.5px;
    }

    .msg-bubble ul,
    .msg-bubble ol {
      padding-left: 18px;
      margin: 4px 0;
    }

    .msg-bubble li {
      margin: 2px 0;
    }

    .msg-bubble strong {
      color: var(--text);
      font-weight: 600;
    }

    .msg-bubble blockquote {
      border-left: 3px solid var(--border);
      padding-left: 10px;
      color: var(--text-muted);
      margin: 6px 0;
    }

    /* tool call block */
    .tool-block {
      background: var(--tool-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-family: var(--mono);
      font-size: 12.5px;
      width: 100%;
    }

    .tool-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: background .1s;
    }

    .tool-header:hover {
      background: var(--surface2);
    }

    .tool-header.open {
      border-bottom-color: var(--border);
    }

    .tool-icon {
      color: var(--yellow);
      font-size: 13px;
    }

    .tool-name {
      color: var(--yellow);
      font-weight: 600;
    }

    .tool-chevron {
      margin-left: auto;
      color: var(--text-muted);
      transition: transform .15s;
    }

    .tool-header.open .tool-chevron {
      transform: rotate(90deg);
    }

    .tool-body {
      padding: 8px 12px;
      color: var(--text-muted);
      display: none;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .tool-body.open {
      display: block;
    }

    /* tool result */
    .result-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-family: var(--mono);
      font-size: 12.5px;
      width: 100%;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
    }

    .result-header.open {
      border-bottom-color: var(--border);
    }

    .result-ok {
      color: var(--green);
    }

    .result-err {
      color: var(--red);
    }

    .result-body {
      padding: 8px 12px;
      color: var(--text-muted);
      display: none;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
    }

    .result-body.open {
      display: block;
    }

    /* thinking */
    .thinking-block {
      color: var(--text-muted);
      font-size: 13px;
      border-left: 2px solid var(--border);
      border-radius: 0 4px 4px 0;
      width: 100%;
    }

    .thinking-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-style: italic;
      user-select: none;
    }

    .thinking-header:hover {
      background: var(--surface2);
    }

    .thinking-toggle {
      margin-left: auto;
      font-size: 11px;
      color: var(--accent);
      font-style: normal;
      white-space: nowrap;
    }

    .thinking-body {
      padding: 0 10px 8px 10px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-style: normal;
      font-size: 12px;
      line-height: 1.6;
    }

    .thinking-body.collapsed {
      display: none;
    }

    /* typing dots */
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: pulse 1.2s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: .2s;
    }

    .dot:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .3;
        transform: scale(.9);
      }

      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    /* ── Buttons ──────────────────────────────────────────────────────── */
    .btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font);
      transition: background .12s, border-color .12s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--surface);
      border-color: var(--text-muted);
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary:hover {
      background: #1c3a6e;
    }

    .btn-danger {
      border-color: var(--red);
      color: var(--red);
    }

    .btn-danger:hover {
      background: var(--red-dim);
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 12px;
    }

    .btn-icon {
      padding: 5px 8px;
      font-size: 15px;
      line-height: 1;
    }

    /* ── Modal ────────────────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .overlay.hidden {
      display: none;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      width: 440px;
      max-width: 95vw;
    }

    .modal h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .form-group select,
    .form-group textarea,
    .form-group input[type=text] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border-color .15s;
    }

    .form-group select:focus,
    .form-group textarea:focus,
    .form-group input:focus {
      border-color: var(--accent);
    }

    .form-group select option {
      background: var(--surface2);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
      font-family: var(--mono);
      font-size: 12.5px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    /* ── Toast ────────────────────────────────────────────────────────── */
    #toasts {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
    }

    .toast {
      padding: 9px 14px;
      border-radius: 6px;
      font-size: 13px;
      border: 1px solid;
      max-width: 320px;
      animation: slide-up .2s ease;
    }

    .toast-ok {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }

    .toast-err {
      background: var(--red-dim);
      border-color: var(--red);
      color: var(--red);
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    /* ── Empty state ──────────────────────────────────────────────────── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 12px;
    }

    #empty-state .big {
      font-size: 40px;
    }

    #empty-state p {
      font-size: 14px;
    }

    /* ── Scrollbars ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* misc */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    .hidden {
      display: none !important;
    }

    #error-banner {
      display: none;
      padding: 8px 16px;
      background: var(--red-dim);
      border-bottom: 1px solid var(--red);
      color: var(--red);
      font-size: 13px;
    }

    /* ── Approval flow ─────────────────────────────────────────────── */
    #confirm-panel {
      margin: 0 16px 10px;
      padding: 12px 16px;
      background: #2d2000;
      border: 1px solid #f59e0b;
      border-radius: 8px;
    }
    .confirm-header {
      color: #f59e0b;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .confirm-tool {
      background: #111;
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .confirm-tool strong { color: #e5e7eb; }
    .confirm-tool pre {
      margin: 6px 0 0;
      white-space: pre-wrap;
      color: #9ca3af;
      font-size: 12px;
      max-height: 180px;
      overflow-y: auto;
    }
    .confirm-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
    }
    .btn-approve { background: #16a34a; color: #fff; border: none; }
    .btn-approve:hover { background: #15803d; }
  </style>
</head>

<body>
  <div id="app">

    <!-- Top bar -->
    <div id="topbar">
      <h1>My<span>Harness</span>Py</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="running-indicator" class="hidden" style="color:var(--green);font-size:12px">● 运行中</span>
        <button class="btn btn-primary btn-sm" onclick="openNewSession()">+ 新建会话</button>
      </div>
    </div>

    <div id="main">

      <!-- Sidebar -->
      <div id="sidebar">
        <div id="sidebar-scroll">

          <!-- Sessions -->
          <div class="sidebar-section">
            <div class="sidebar-label">会话</div>
            <div id="sessions-list">
              <div class="sidebar-item" style="color:var(--text-muted);font-size:12px;padding-left:16px">暂无会话</div>
            </div>
          </div>

          <div class="divider"></div>

          <!-- Skills -->
          <div class="sidebar-section">
            <div class="sidebar-label">Skills</div>
            <div id="skills-list">
              <div class="sidebar-item" style="color:var(--text-muted);font-size:12px;padding-left:16px">加载中…</div>
            </div>
          </div>

          <div class="divider"></div>

          <!-- Personas -->
          <div class="sidebar-section">
            <div class="sidebar-label">身份 Personas</div>
            <div id="personas-list">
              <div class="sidebar-item" style="color:var(--text-muted);font-size:12px;padding-left:16px">加载中…</div>
            </div>
          </div>
        </div>

        <!-- Sidebar bottom -->
        <div id="sidebar-bottom">
          <button class="btn btn-sm" style="width:100%" onclick="toggleConfig()">⚙ 配置文件</button>
        </div>
      </div>

      <!-- Chat area -->
      <div id="chat-wrap">
        <div id="session-header">
          <span id="session-title" style="font-size:13px;color:var(--text-muted)">未选择会话</span>
          <span id="session-meta" class="meta hidden"></span>
          <div style="margin-left:auto;display:flex;gap:6px">
            <button id="cancel-btn" class="btn btn-sm btn-danger hidden" onclick="cancelSession()">停止</button>
            <button id="delete-btn" class="btn btn-sm hidden" onclick="deleteSession()">关闭会话</button>
          </div>
        </div>

        <div id="error-banner" id="error-banner"></div>

        <!-- Approval panel (shown when WAITING_CONFIRMATION) -->
        <div id="confirm-panel" class="hidden">
          <div class="confirm-header">⚠ Agent 请求执行高风险操作，请审批：</div>
          <div id="confirm-tool-info"></div>
          <div class="confirm-actions">
            <button class="btn btn-danger btn-sm" onclick="denyAction()">拒绝</button>
            <button class="btn btn-approve btn-sm" onclick="confirmAction()">允许执行</button>
          </div>
        </div>

        <!-- Messages or empty state -->
        <div id="messages-wrap" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
          <div id="empty-state">
            <p>选择一个Persona新建会话</p>
            <button class="btn btn-primary" onclick="openNewSession()">+ 新建会话</button>
          </div>
          <div id="messages" class="hidden"></div>
        </div>

        <div id="input-bar">
          <textarea id="msg-input" placeholder="输入消息，Shift+Enter 换行，Enter 发送…" rows="1"
            onkeydown="handleInputKey(event)" oninput="autoGrow(this)"></textarea>
          <button class="btn btn-primary" onclick="sendMessage()" id="send-btn">发送</button>
        </div>
      </div>

      <!-- Config panel -->
      <div id="config-panel">
        <div id="config-panel-header">
          <span>配置文件</span>
          <button class="btn-icon btn" onclick="toggleConfig()" title="关闭">✕</button>
        </div>
        <div id="config-tree"></div>
        <div id="config-editor-wrap">
          <div id="config-filename" style="color:var(--text-muted);font-style:italic">← 选择文件编辑</div>
          <textarea id="config-editor" placeholder="选择左侧文件…" disabled></textarea>
          <div id="config-actions">
            <button class="btn btn-primary btn-sm" onclick="saveConfigFile()" id="config-save-btn" disabled>保存</button>
            <button class="btn btn-sm btn-danger" onclick="deleteConfigFile()" id="config-del-btn" disabled>删除</button>
            <span id="config-status"
              style="font-size:12px;color:var(--text-muted);margin-left:4px;align-self:center"></span>
          </div>
        </div>
      </div>

    </div><!-- #main -->
  </div><!-- #app -->

  <!-- New Session Modal -->
  <div id="modal-overlay" class="overlay hidden">
    <div class="modal">
      <h2>新建会话</h2>
      <div class="form-group">
        <label>Provider</label>
        <select id="sel-provider"></select>
      </div>
      <div class="form-group">
        <label>Persona（Agent 的身份与权限）</label>
        <select id="sel-persona">
          <option value="">— 不使用 Persona —</option>
        </select>
        <div id="persona-desc" style="font-size:12px;color:var(--text-muted);margin-top:4px;min-height:16px"></div>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="createSession()">创建</button>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toasts"></div>

  <script>
    'use strict';

    // ── State ────────────────────────────────────────────────────────────
    let currentSessionId = null;
    let pollTimer = null;
    let sessionRefreshTimer = null;
    let lastMsgCount = 0;
    let overview = { skills: [], personas: [], providers: [], default_provider: '' };
    let currentConfigFile = null;  // { type: 'skill'|'persona'|'yaml', name: string }
    let allSessions = [];
    let ws = null;               // active WebSocket
    let streamEl = null;         // current streaming bubble DOM node
    let streamText = '';         // accumulated text token text
    let streamThinkingText = ''; // accumulated thinking token text
    let streamIsThinking = false;
    // Poll deduplication: at most one doPoll in-flight + one queued
    let doPollInFlight = false;
    let doPollQueued  = false;

    // ── Boot ─────────────────────────────────────────────────────────────
    async function boot() {
      await loadOverview();
      await refreshSessions();
    }

    async function loadOverview() {
      try {
        const r = await api('/config/overview');
        overview = r;
        renderSidebar();
        populateModal();
      } catch (e) { toast('加载配置失败: ' + e.message, true); }
    }

    async function refreshSessions() {
      try {
        const r = await api('/sessions');
        allSessions = r.sessions || [];
        renderSessionsList();
      } catch (e) { }
    }

    // ── Render Sidebar ───────────────────────────────────────────────────
    function renderSidebar() {
      // Skills
      const sl = document.getElementById('skills-list');
      sl.innerHTML = '';
      if (!overview.skills.length) {
        sl.innerHTML = '<div class="sidebar-item" style="color:var(--text-muted);font-size:12px;padding-left:16px">暂无 Skill</div>';
      } else {
        overview.skills.forEach(s => {
          const el = div('sidebar-item', `🔧 ${s.name}`);
          el.title = s.description || s.name;
          el.onclick = () => loadConfigFile('skill', s.name);
          sl.appendChild(el);
        });
      }

      // Personas
      const pl = document.getElementById('personas-list');
      pl.innerHTML = '';
      if (!overview.personas.length) {
        pl.innerHTML = '<div class="sidebar-item" style="color:var(--text-muted);font-size:12px;padding-left:16px">暂无 Persona</div>';
      } else {
        overview.personas.forEach(p => {
          const el = div('sidebar-item', `👤 ${p.name}`);
          el.title = p.description || p.name;
          el.onclick = () => openNewSession(p.name);
          pl.appendChild(el);
        });
      }
    }

    function renderSessionsList() {
      const sl = document.getElementById('sessions-list');
      sl.innerHTML = '';
      if (!allSessions.length) {
        sl.innerHTML = '<div class="sidebar-item" style="color:var(--text-muted);font-size:12px;padding-left:16px">暂无会话</div>';
        return;
      }
      allSessions.forEach(s => {
        const stateClass = s.state === 'RUNNING' ? 'badge-run' : s.state === 'ERROR' ? 'badge-err' : 'badge-done';
        const stateText = s.state === 'RUNNING' ? '运行' : s.state === 'ERROR' ? '错误' : s.state === 'WAITING_INPUT' ? '等待' : '完成';
        const label = s.persona ? `👤 ${s.persona}` : `💬 ${s.session_id.slice(0, 8)}`;
        const el = div('sidebar-item' + (s.session_id === currentSessionId ? ' active' : ''), label);
        const badge = div('badge ' + stateClass, stateText);
        el.appendChild(badge);
        el.onclick = () => switchSession(s.session_id);
        sl.appendChild(el);
      });
    }

    // ── Modal ─────────────────────────────────────────────────────────────
    function populateModal() {
      const provSel = document.getElementById('sel-provider');
      provSel.innerHTML = '';
      overview.providers.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p; opt.textContent = p;
        if (p === overview.default_provider) opt.selected = true;
        provSel.appendChild(opt);
      });

      const persSel = document.getElementById('sel-persona');
      persSel.innerHTML = '<option value="">— 不使用 Persona —</option>';
      overview.personas.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.description ? `${p.name} — ${p.description}` : p.name;
        opt.dataset.desc = p.description || '';
        persSel.appendChild(opt);
      });

      // Show persona description on change
      persSel.onchange = () => {
        const selected = persSel.options[persSel.selectedIndex];
        const descEl = document.getElementById('persona-desc');
        if (descEl) descEl.textContent = selected ? (selected.dataset.desc || '') : '';
      };
    }

    function openNewSession(prePersona = '') {
      document.getElementById('modal-overlay').classList.remove('hidden');
      if (prePersona) {
        document.getElementById('sel-persona').value = prePersona;
        document.getElementById('sel-persona').dispatchEvent(new Event('change'));
      }
    }
    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
      document.getElementById('sel-persona').value = '';
      const descEl = document.getElementById('persona-desc');
      if (descEl) descEl.textContent = '';
    }

    async function createSession() {
      const btn = document.querySelector('#modal-overlay .btn-primary');
      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = '创建中…';

      const persona = document.getElementById('sel-persona').value;
      const provider = document.getElementById('sel-provider').value;

      const body = { provider };
      if (persona) body.persona = persona;

      try {
        const r = await api('/sessions', 'POST', body);
        closeModal();
        toast('会话已创建');
        await refreshSessions();
        switchSession(r.session_id);
      } catch (e) {
        toast('创建失败: ' + e.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = '创建';
      }
    }

    // ── Session management ────────────────────────────────────────────────
    async function switchSession(id) {
      stopPolling();
      disconnectWS();
      currentSessionId = id;
      lastMsgCount = 0;
      doPollInFlight = false;
      doPollQueued  = false;
      renderSessionsList();
      showChatArea();

      // Load initial state
      try {
        const snap = await api(`/sessions/${id}/state`);
        renderSnapshot(snap);
        if (snap.is_running) startPolling();
      } catch (e) { toast('加载会话失败: ' + e.message, true); }

      connectWS(id);
    }

    function showChatArea() {
      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('messages').classList.remove('hidden');
      document.getElementById('messages').innerHTML = '';
      document.getElementById('delete-btn').classList.remove('hidden');
    }

    async function deleteSession() {
      if (!currentSessionId) return;
      if (!confirm('关闭该会话？')) return;
      try {
        await api(`/sessions/${currentSessionId}`, 'DELETE');
        stopPolling();
        disconnectWS();
        currentSessionId = null;
        lastMsgCount = 0;
        document.getElementById('messages').classList.add('hidden');
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('session-title').textContent = '未选择会话';
        document.getElementById('session-meta').classList.add('hidden');
        document.getElementById('delete-btn').classList.add('hidden');
        document.getElementById('cancel-btn').classList.add('hidden');
        await refreshSessions();
        toast('会话已关闭');
      } catch (e) { toast('关闭失败: ' + e.message, true); }
    }

    async function confirmAction() {
      if (!currentSessionId) return;
      // Immediately hide panel (optimistic update — don't wait for server round-trip)
      document.getElementById('confirm-panel').classList.add('hidden');
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'confirm' }));
      } else {
        await api(`/sessions/${currentSessionId}/confirm`, 'POST');
        doPoll();
      }
    }

    async function denyAction() {
      if (!currentSessionId) return;
      // Immediately hide panel
      document.getElementById('confirm-panel').classList.add('hidden');
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'deny' }));
      } else {
        await api(`/sessions/${currentSessionId}/deny`, 'POST');
        doPoll();
      }
    }

    async function cancelSession() {
      if (!currentSessionId) return;
      try {
        await api(`/sessions/${currentSessionId}/cancel`, 'POST');
        toast('已发送停止信号');
      } catch (e) { toast('停止失败: ' + e.message, true); }
    }

    // ── Messaging ─────────────────────────────────────────────────────────
    async function sendMessage() {
      const inp = document.getElementById('msg-input');
      const btn = document.getElementById('send-btn');
      const text = inp.value.trim();
      if (!text || !currentSessionId || btn.disabled) return;

      btn.disabled = true;
      inp.value = '';
      autoGrow(inp);

      try {
        await api(`/sessions/${currentSessionId}/messages`, 'POST', { text });
        triggerPoll(); // immediately render the user message in the UI
        // Only start polling if WS is not connected — WS state frame will trigger doPoll when done.
        if (!ws || ws.readyState !== WebSocket.OPEN) startPolling();
        document.getElementById('cancel-btn').classList.remove('hidden');
      } catch (e) {
        toast('发送失败: ' + e.message, true);
      } finally {
        btn.disabled = false;
        inp.focus();
      }
    }

    function handleInputKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoGrow(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ── Polling ───────────────────────────────────────────────────────────
    function startPolling() {
      if (pollTimer) return;
      pollTimer = setInterval(doPoll, 800);
      // Refresh the session list every 3s while running so sub-agent sessions appear
      sessionRefreshTimer = setInterval(refreshSessions, 3000);
    }

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      if (sessionRefreshTimer) { clearInterval(sessionRefreshTimer); sessionRefreshTimer = null; }
      document.getElementById('running-indicator').classList.add('hidden');
      document.getElementById('cancel-btn').classList.add('hidden');
    }

    // ── WebSocket streaming ───────────────────────────────────────────────
    function connectWS(sessionId) {
      disconnectWS();
      streamEl = null; streamText = ''; streamThinkingText = ''; streamIsThinking = false;
      const wsUrl = location.origin.replace(/^http/, 'ws') + '/ws/' + sessionId;
      ws = new WebSocket(wsUrl);
      ws.onmessage = handleWsFrame;
      ws.onclose = () => { ws = null; if (currentSessionId) startPolling(); }; // fallback if WS drops
    }

    function disconnectWS() {
      if (ws) { ws.onclose = null; ws.close(); ws = null; }
      if (streamEl) { streamEl.remove(); streamEl = null; }
      streamText = ''; streamThinkingText = ''; streamIsThinking = false;
    }

    function handleWsFrame(ev) {
      let frame;
      try { frame = JSON.parse(ev.data); } catch { return; }
      const container = document.getElementById('messages');
      if (!container) return;

      if (frame.type === 'thinking') {
        ensureStreamEl(container);
        streamIsThinking = true;
        streamText = '';
        streamThinkingText = '';
        streamEl.querySelector('.msg-bubble').innerHTML =
          '<em style="color:var(--text-muted);font-style:italic">💭 正在思考…</em>';

      } else if (frame.type === 'thinking_token') {
        streamThinkingText += frame.data;
        ensureStreamEl(container);
        const bubble = streamEl.querySelector('.msg-bubble');
        // Build scrollable structure on first token
        let thinkBody = bubble.querySelector('.thinking-stream-body');
        if (!thinkBody) {
          bubble.innerHTML =
            '<em style="color:var(--text-muted);font-style:italic">💭 思考中…</em>' +
            '<div class="thinking-stream-body" style="max-height:160px;overflow-y:auto;' +
            'font-size:12px;color:var(--text-muted);white-space:pre-wrap;' +
            'padding:4px 0;margin-top:4px;line-height:1.6"></div>';
          thinkBody = bubble.querySelector('.thinking-stream-body');
        }
        thinkBody.textContent = streamThinkingText;
        thinkBody.scrollTop = thinkBody.scrollHeight;
        container.scrollTop = container.scrollHeight;

      } else if (frame.type === 'token') {
        if (streamIsThinking) { streamIsThinking = false; streamText = ''; streamThinkingText = ''; }
        ensureStreamEl(container);
        streamText += frame.data;
        streamEl.querySelector('.msg-bubble').textContent = streamText;
        container.scrollTop = container.scrollHeight;

      } else if (frame.type === 'message') {
        // A message completed (tool call or tool result). Trigger an incremental
        // snapshot fetch so renderSnapshot() is the single source of truth.
        // This avoids lastMsgCount desync from direct rendering + doPoll races.
        const m = frame.data;
        const isToolActivity =
          (m?.role === 'assistant' && (m.content || []).some(b => b.type === 'tool_call')) ||
          m?.role === 'tool';
        if (isToolActivity) {
          triggerPoll();
          // If a spawn_agent/spawn_agents call was made, refresh the session list
          // after a short delay so new sub-agent sessions appear in the sidebar.
          const hasSpawnCall = m?.role === 'assistant' && (m.content || []).some(
            b => b.type === 'tool_call' && (b.tool_name === 'spawn_agent' || b.tool_name === 'spawn_agents')
          );
          if (hasSpawnCall) {
            setTimeout(refreshSessions, 600);
            setTimeout(refreshSessions, 2500);
          }
        }

      } else if (frame.type === 'state') {
        // Always re-render on state change so confirm panel hides immediately after approve/deny
        if (frame.data && !frame.data.is_running) {
          triggerPoll();   // final state: clear stream el, append complete messages
        } else if (frame.data) {
          triggerPoll();   // mid-run state update (e.g. RUNNING after confirm)
        }

      } else if (frame.type === 'error') {
        toast('引擎错误: ' + (frame.data?.detail || JSON.stringify(frame.data)), true);
      }
    }

    function ensureStreamEl(container) {
      if (streamEl) return;
      streamEl = document.createElement('div');
      streamEl.className = 'msg assistant';
      streamEl.innerHTML = '<div class="msg-role">Assistant</div><div class="msg-bubble"></div>';
      const dots = document.getElementById('typing-dots');
      if (dots) container.insertBefore(streamEl, dots);
      else container.appendChild(streamEl);
    }

    // Trigger an immediate incremental poll, deduplicating concurrent calls.
    // At most one doPoll runs at a time; if another arrives while in-flight,
    // it is queued and runs once the current one completes.
    function triggerPoll() {
      if (doPollInFlight) { doPollQueued = true; return; }
      doPollInFlight = true;
      doPoll().finally(() => {
        doPollInFlight = false;
        if (doPollQueued) { doPollQueued = false; triggerPoll(); }
      });
    }

    async function doPoll() {
      if (!currentSessionId) { stopPolling(); return; }
      try {
        const snap = await api(`/sessions/${currentSessionId}/state`);
        renderSnapshot(snap);
        if (!snap.is_running) {
          stopPolling();
          await refreshSessions();
        }
      } catch (e) { }
    }

    // ── Rendering ─────────────────────────────────────────────────────────
    function renderSnapshot(snap) {
      // Remove streaming bubble only when the engine finishes — while still running,
      // the bubble is owned by the WS token stream and must not be cleared by polling.
      if (streamEl && !snap.is_running) { streamEl.remove(); streamEl = null; streamText = ''; streamThinkingText = ''; streamIsThinking = false; }

      const msgs = snap.last_messages || [];
      const meta = snap.meta || {};

      // Header
      const titleEl = document.getElementById('session-title');
      const metaEl = document.getElementById('session-meta');
      titleEl.textContent = currentSessionId.slice(0, 8);
      const parts = [];
      if (meta.skill) parts.push(`Skill: <strong>${meta.skill}</strong>`);
      if (meta.persona) parts.push(`Persona: <strong>${meta.persona}</strong>`);
      if (meta.provider) parts.push(meta.provider);
      if (parts.length) {
        metaEl.innerHTML = parts.join(' &nbsp;·&nbsp; ');
        metaEl.classList.remove('hidden');
      }

      // Running indicator (hide during confirmation — user sees the approval panel instead)
      if (snap.is_running && snap.state !== 'WAITING_CONFIRMATION') {
        document.getElementById('running-indicator').classList.remove('hidden');
        document.getElementById('cancel-btn').classList.remove('hidden');
      }

      // Error banner
      const errBanner = document.getElementById('error-banner');
      if (snap.state === 'ERROR') {
        errBanner.style.display = 'block';
        errBanner.textContent = '⚠ 引擎出错：' + (snap.last_error || '').split('\n').slice(-1)[0];
      } else {
        errBanner.style.display = 'none';
      }

      // Approval panel
      const confirmPanel = document.getElementById('confirm-panel');
      const confirmInfo = document.getElementById('confirm-tool-info');
      if (snap.state === 'WAITING_CONFIRMATION' && snap.pending_approval?.length) {
        confirmInfo.innerHTML = snap.pending_approval.map(t => {
          const inputStr = JSON.stringify(t.input, null, 2);
          return `<div class="confirm-tool"><strong>${escHtml(t.name)}</strong><pre>${escHtml(inputStr)}</pre></div>`;
        }).join('');
        confirmPanel.classList.remove('hidden');
        // Remove typing dots while waiting for user input
        const dotsEl = document.getElementById('typing-dots');
        if (dotsEl) dotsEl.remove();
      } else {
        confirmPanel.classList.add('hidden');
      }

      // Render only new messages
      const container = document.getElementById('messages');
      const prevCount = lastMsgCount;
      lastMsgCount = msgs.length;

      for (let i = prevCount; i < msgs.length; i++) {
        try {
          renderMessage(container, msgs[i]);
        } catch(err) {
          console.error('[renderMessage] failed for msg index', i, msgs[i], err);
        }
      }

      // If new messages were rendered while the engine is still running,
      // the streaming bubble now shows stale text from a completed LLM turn.
      // Reset it so the next LLM turn starts with a fresh streaming bubble.
      if (prevCount < lastMsgCount && snap.is_running && streamEl) {
        streamEl.remove(); streamEl = null;
        streamText = ''; streamThinkingText = ''; streamIsThinking = false;
      }

      // Typing dots
      let dotsEl = document.getElementById('typing-dots');
      if (snap.is_running) {
        if (!dotsEl) {
          dotsEl = document.createElement('div');
          dotsEl.id = 'typing-dots';
          dotsEl.className = 'typing-dots';
          dotsEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
          container.appendChild(dotsEl);
        }
      } else if (dotsEl) {
        dotsEl.remove();
      }

      // Scroll to bottom
      container.scrollTop = container.scrollHeight;
    }

    function renderMessage(container, m) {
      const role = m.role;
      const content = m.content || [];

      if (role === 'user') {
        const text = content.filter(b => b.type === 'text').map(b => b.text).join('\n');
        if (!text) return;
        const el = div('msg user');
        el.innerHTML = `<div class="msg-role">You</div><div class="msg-bubble">${escHtml(text).replace(/\n/g, '<br>')}</div>`;
        container.appendChild(el);
        return;
      }

      if (role === 'assistant') {
        const textBlocks = content.filter(b => b.type === 'text' && b.text);
        const toolCalls = content.filter(b => b.type === 'tool_call');
        const thinkBlocks = content.filter(b => b.type === 'thinking' && b.thinking);

        if (thinkBlocks.length) {
          thinkBlocks.forEach(tb => {
            const el = document.createElement('div');
            el.className = 'thinking-block';
            el.innerHTML =
              `<div class="thinking-header">` +
              `<span>💭 思考过程</span>` +
              `<span style="font-size:11px">(${tb.thinking.length} 字)</span>` +
              `<span class="thinking-toggle">展开 ▼</span>` +
              `</div>` +
              `<div class="thinking-body collapsed">${escHtml(tb.thinking)}</div>`;
            el.querySelector('.thinking-header').addEventListener('click', () => {
              const body = el.querySelector('.thinking-body');
              const toggle = el.querySelector('.thinking-toggle');
              const collapsed = body.classList.toggle('collapsed');
              toggle.textContent = collapsed ? '展开 ▼' : '收起 ▲';
            });
            container.appendChild(el);
          });
        }

        toolCalls.forEach(tc => {
          container.appendChild(renderToolCall(tc));
        });

        if (textBlocks.length) {
          const raw = textBlocks.map(b => b.text).join('\n\n');
          const el = div('msg assistant');
          el.innerHTML = `<div class="msg-role">Assistant</div><div class="msg-bubble">${mdToHtml(raw)}</div>`;
          container.appendChild(el);
        }
        return;
      }

      if (role === 'tool') {
        content.filter(b => b.type === 'tool_result').forEach(tr => {
          // think tool result is already shown via the tool-call block — skip duplicate
          if (tr.tool_name === 'think') return;
          container.appendChild(renderToolResult(tr));
        });
      }
    }

    function renderToolCall(tc) {
      // think tool: render as a collapsible thinking block instead of a generic tool block
      if (tc.tool_name === 'think') {
        const thought = (tc.tool_input?.thought || '').trim();
        const wrap = document.createElement('div');
        wrap.className = 'thinking-block';
        wrap.innerHTML =
          `<div class="thinking-header">` +
          `<span>💭 思考过程</span>` +
          `<span style="font-size:11px;margin-left:6px;color:var(--text-muted)">(${thought.length} 字)</span>` +
          `<span class="thinking-toggle" style="margin-left:auto">展开 ▼</span>` +
          `</div>` +
          `<div class="thinking-body collapsed" style="white-space:pre-wrap">${escHtml(thought)}</div>`;
        wrap.querySelector('.thinking-header').addEventListener('click', () => {
          const body = wrap.querySelector('.thinking-body');
          const toggle = wrap.querySelector('.thinking-toggle');
          const collapsed = body.classList.toggle('collapsed');
          toggle.textContent = collapsed ? '展开 ▼' : '收起 ▲';
        });
        return wrap;
      }

      // spawn_agents: expanded card showing each agent's task
      if (tc.tool_name === 'spawn_agents') {
        let agents = tc.tool_input?.agents || [];
        // LLM sometimes serializes the array as a JSON string — parse it back
        if (typeof agents === 'string') {
          try { agents = JSON.parse(agents); } catch { agents = []; }
        }
        if (!Array.isArray(agents)) agents = [];
        const agentItems = agents.map((a, i) => {
          const task = a.task || '';
          return `<div style="padding:5px 0;display:flex;gap:8px;align-items:flex-start;border-bottom:1px solid var(--border)">` +
            `<span style="color:var(--green);font-size:11px;white-space:nowrap;margin-top:2px;min-width:54px">Agent ${i + 1}</span>` +
            `<span style="font-size:12px;color:var(--text)">${escHtml(task.slice(0, 120))}${task.length > 120 ? '…' : ''}</span>` +
            `</div>`;
        }).join('');
        const wrap = document.createElement('div');
        wrap.className = 'tool-block';
        wrap.innerHTML =
          `<div class="tool-header open" onclick="toggleCollapse(this)">` +
          `<span class="tool-icon">🤖</span>` +
          `<span class="tool-name" style="color:var(--green)">spawn_agents</span>` +
          `<span style="color:var(--text-muted);font-size:11px;margin-left:8px">${agents.length} 个子 Agent 并行</span>` +
          `<span class="tool-chevron">▶</span>` +
          `</div>` +
          `<div class="tool-body open" style="padding:6px 12px">${agentItems || '<em style="color:var(--text-muted);font-size:12px">（无 agents）</em>'}</div>`;
        return wrap;
      }

      // spawn_agent: expanded card showing the task
      if (tc.tool_name === 'spawn_agent') {
        const task = tc.tool_input?.task || '';
        const wrap = document.createElement('div');
        wrap.className = 'tool-block';
        wrap.innerHTML =
          `<div class="tool-header open" onclick="toggleCollapse(this)">` +
          `<span class="tool-icon">🤖</span>` +
          `<span class="tool-name" style="color:var(--green)">spawn_agent</span>` +
          `<span style="color:var(--text-muted);font-size:11px;margin-left:8px">${escHtml(task.slice(0, 60))}${task.length > 60 ? '…' : ''}</span>` +
          `<span class="tool-chevron">▶</span>` +
          `</div>` +
          `<div class="tool-body open" style="padding:8px 12px;font-size:12px;color:var(--text);white-space:pre-wrap">${escHtml(task)}</div>`;
        return wrap;
      }

      const inputStr = JSON.stringify(tc.tool_input || {}, null, 2);
      const wrap = document.createElement('div');
      wrap.className = 'tool-block';
      wrap.innerHTML = `
    <div class="tool-header" onclick="toggleCollapse(this)">
      <span class="tool-icon">🔧</span>
      <span class="tool-name">${escHtml(tc.tool_name)}</span>
      <span style="color:var(--text-muted);font-size:11px;margin-left:8px">${shortInput(tc.tool_input)}</span>
      <span class="tool-chevron">▶</span>
    </div>
    <div class="tool-body"><pre>${escHtml(inputStr)}</pre></div>`;
      return wrap;
    }

    function renderToolResult(tr) {
      const isErr = tr.is_error;
      const content = tr.content || '';
      const toolLabel = tr.tool_name ? escHtml(tr.tool_name) : '工具结果';
      const preview = content.slice(0, 200) + (content.length > 200 ? '…' : '');
      const wrap = document.createElement('div');
      wrap.className = 'result-block';
      wrap.innerHTML = `
    <div class="result-header" onclick="toggleCollapse(this, 'result-body')">
      <span class="${isErr ? 'result-err' : 'result-ok'}">${isErr ? '✗' : '✓'}</span>
      <span style="font-size:11px;color:var(--accent);font-weight:600;margin-left:2px">${toolLabel}</span>
      <span style="font-size:11px;color:var(--text-muted);margin-left:8px">${escHtml(preview.replace(/\n/g, ' '))}</span>
      <span class="tool-chevron" style="margin-left:auto;color:var(--text-muted)">▶</span>
    </div>
    <div class="result-body"><pre>${escHtml(content)}</pre></div>`;
      return wrap;
    }

    function toggleCollapse(header, bodyClass = 'tool-body') {
      header.classList.toggle('open');
      header.nextElementSibling.classList.toggle('open');
    }

    function shortInput(inp) {
      if (!inp) return '';
      const v = Object.values(inp)[0];
      if (typeof v === 'string') return escHtml(v.slice(0, 40) + (v.length > 40 ? '…' : ''));
      return '';
    }

    // ── Config Panel ──────────────────────────────────────────────────────
    function toggleConfig() {
      const panel = document.getElementById('config-panel');
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) buildConfigTree();
    }

    async function buildConfigTree() {
      const tree = document.getElementById('config-tree');
      tree.innerHTML = '';

      // Skills
      tree.appendChild(div('tree-folder', '📁 skills/'));
      try {
        const r = await api('/config/skills');
        (r.skills || []).forEach(s => {
          const row = treeFileRow(s.name, () => loadConfigFile('skill', s.name));
          row.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); confirmDeleteConfig('skill', s.name); };
          tree.appendChild(row);
        });
      } catch (e) { }
      tree.appendChild(addNewRow('skill'));

      // Personas
      tree.appendChild(div('tree-folder', '📁 personas/'));
      try {
        const r = await api('/config/personas');
        (r.personas || []).forEach(p => {
          const name = typeof p === 'string' ? p : p.name;
          const row = treeFileRow(name, () => loadConfigFile('persona', name));
          row.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); confirmDeleteConfig('persona', name); };
          tree.appendChild(row);
        });
      } catch (e) { }
      tree.appendChild(addNewRow('persona'));

      // config.yaml
      tree.appendChild(div('tree-folder', '📄 config.yaml'));
      const yamlRow = treeFileRow('config.yaml', () => loadConfigFile('yaml', 'config.yaml'));
      yamlRow.querySelector('.del-btn').remove();
      tree.appendChild(yamlRow);
    }

    function treeFileRow(name, onclick) {
      const row = document.createElement('div');
      row.className = 'tree-file';
      row.innerHTML = `<span>📄 ${escHtml(name)}</span><span class="del-btn" title="删除">✕</span>`;
      row.addEventListener('click', onclick);
      return row;
    }

    function addNewRow(type) {
      const wrap = div('tree-new');
      const inp = document.createElement('input');
      inp.type = 'text'; inp.placeholder = '新建名称…';
      const btn = div('', '＋');
      btn.className = 'btn btn-sm btn-primary';
      btn.style.padding = '2px 8px';
      btn.onclick = async () => {
        const name = inp.value.trim();
        if (!name) return;
        const tmpl = type === 'skill'
          ? `---\nname: ${name}\ndescription: "${name}"\nprovider: bltcy-anthropic\ntask_goal: ""\ntools:\n  - read_file\n  - search\n---\n\n你是一个...`
          : '你是一个...\n\n回答时用中文。';
        try {
          if (type === 'skill') await api('/config/skills', 'POST', { name, content: tmpl });
          else await api('/config/personas', 'POST', { name, content: tmpl });
          toast(`${name} 已创建`);
          inp.value = '';
          buildConfigTree();
          await loadConfigFile(type, name);
          await loadOverview();
        } catch (e) { toast(e.message, true); }
      };
      wrap.appendChild(inp); wrap.appendChild(btn);
      return wrap;
    }

    async function loadConfigFile(type, name) {
      // Highlight active
      document.querySelectorAll('.tree-file').forEach(el => {
        const txt = el.querySelector('span')?.textContent;
        el.classList.toggle('active', txt === `📄 ${name}` || txt === `📄 ${name}`);
      });

      currentConfigFile = { type, name };
      document.getElementById('config-filename').textContent = type === 'yaml' ? 'config.yaml' : `${type === 'skill' ? 'skills' : 'personas'}/${name}.md`;
      document.getElementById('config-filename').style.color = 'var(--accent)';
      document.getElementById('config-editor').disabled = false;
      document.getElementById('config-save-btn').disabled = false;
      document.getElementById('config-del-btn').disabled = type === 'yaml';
      document.getElementById('config-status').textContent = '';

      try {
        let r;
        if (type === 'skill') r = await api(`/config/skills/${name}`);
        else if (type === 'persona') r = await api(`/config/personas/${name}`);
        else r = await api('/config/yaml');
        document.getElementById('config-editor').value = r.content || '';
      } catch (e) { toast('加载失败: ' + e.message, true); }
    }

    async function saveConfigFile() {
      if (!currentConfigFile) return;
      const { type, name } = currentConfigFile;
      const content = document.getElementById('config-editor').value;
      try {
        if (type === 'skill') await api(`/config/skills/${name}`, 'PUT', { content });
        else if (type === 'persona') await api(`/config/personas/${name}`, 'PUT', { content });
        else await api('/config/yaml', 'PUT', { content });
        document.getElementById('config-status').textContent = '✓ 已保存';
        setTimeout(() => document.getElementById('config-status').textContent = '', 2000);
        await loadOverview();
        await buildConfigTree();
      } catch (e) { toast('保存失败: ' + e.message, true); }
    }

    async function confirmDeleteConfig(type, name) {
      if (!confirm(`确认删除 ${name}？`)) return;
      try {
        if (type === 'skill') await api(`/config/skills/${name}`, 'DELETE');
        else await api(`/config/personas/${name}`, 'DELETE');
        toast(`${name} 已删除`);
        currentConfigFile = null;
        document.getElementById('config-editor').value = '';
        document.getElementById('config-editor').disabled = true;
        document.getElementById('config-save-btn').disabled = true;
        document.getElementById('config-del-btn').disabled = true;
        document.getElementById('config-filename').textContent = '← 选择文件编辑';
        document.getElementById('config-filename').style.color = 'var(--text-muted)';
        await loadOverview();
        buildConfigTree();
      } catch (e) { toast('删除失败: ' + e.message, true); }
    }

    async function deleteConfigFile() {
      if (!currentConfigFile || currentConfigFile.type === 'yaml') return;
      confirmDeleteConfig(currentConfigFile.type, currentConfigFile.name);
    }

    // ── Utilities ─────────────────────────────────────────────────────────
    async function api(path, method = 'GET', body = null) {
      const opts = { method, headers: {} };
      if (body !== null) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      const r = await fetch(path, opts);
      if (r.status === 204) return null;
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || r.statusText);
      return data;
    }

    function div(cls, text = '') {
      const el = document.createElement('div');
      if (cls) el.className = cls;
      if (text) el.textContent = text;
      return el;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function mdToHtml(md) {
      // Very light markdown: bold, inline code, code blocks, lists
      let h = escHtml(md);
      // code blocks
      h = h.replace(/```[\w]*\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      // inline code
      h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
      // bold
      h = h.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      // headers
      h = h.replace(/^### (.*?)$/gm, '<strong>$1</strong>');
      h = h.replace(/^## (.*?)$/gm, '<strong style="font-size:1.05em">$1</strong>');
      h = h.replace(/^# (.*?)$/gm, '<strong style="font-size:1.1em">$1</strong>');
      // unordered list
      h = h.replace(/^[- *] (.*?)$/gm, '<li>$1</li>');
      h = h.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
      // line breaks → paragraphs
      h = h.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
      return h;
    }

    function toast(msg, isErr = false) {
      const el = document.createElement('div');
      el.className = 'toast ' + (isErr ? 'toast-err' : 'toast-ok');
      el.textContent = msg;
      document.getElementById('toasts').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // Close modal on overlay click
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    // ── Start ──────────────────────────────────────────────────────────────
    boot();
  </script>
</body>
