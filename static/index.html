<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyHarnessPy</title>
  <style>
    /* ── Reset & Variables ────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f3a5f;
      --green: #3fb950;
      --green-dim: #0d2a18;
      --yellow: #d29922;
      --yellow-dim: #2d2208;
      --red: #f85149;
      --red-dim: #2d1118;
      --tool-bg: #1c2128;
      --user-bg: #1f3a5f;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
    }

    /* ── Layout ───────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 48px;
      min-height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #topbar h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .02em;
      color: var(--text);
    }

    #topbar h1 span {
      color: var(--accent);
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
      min-width: 0;
    }

    /* sidebar */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .sidebar-section {
      padding: 4px 0 8px;
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 8px 14px 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      cursor: pointer;
      transition: background .12s;
      border-radius: 0;
      color: var(--text-muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .sidebar-item.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .sidebar-item .session-label {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-item .pin-icon {
      font-size: 10px;
      flex-shrink: 0;
    }

    .sidebar-item .session-menu-btn {
      opacity: 0;
      flex-shrink: 0;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .sidebar-item:hover .session-menu-btn {
      opacity: 1;
    }

    .sidebar-item .session-menu-btn:hover {
      color: var(--text);
    }

    .sidebar-item .badge {
      margin-left: auto;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .badge-run {
      background: var(--green-dim);
      color: var(--green);
    }

    .badge-done {
      background: var(--surface2);
      color: var(--text-muted);
    }

    .badge-err {
      background: var(--red-dim);
      color: var(--red);
    }

    .badge-wait {
      background: var(--yellow-dim);
      color: var(--yellow);
    }

    /* session dropdown menu */
    #session-dropdown {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 0;
      min-width: 140px;
      z-index: 300;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      display: none;
    }

    #session-dropdown.open {
      display: block;
    }

    #session-dropdown .menu-item {
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      transition: background .1s;
    }

    #session-dropdown .menu-item:hover {
      background: var(--surface2);
    }

    #session-dropdown .menu-item.danger {
      color: var(--red);
    }

    #session-dropdown .menu-item.danger:hover {
      background: var(--red-dim);
    }

    #archive-toggle {
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 14px;
      user-select: none;
    }

    #archive-toggle:hover {
      color: var(--text);
    }

    #sidebar-bottom {
      border-top: 1px solid var(--border);
      padding: 8px;
    }

    /* chat area */
    #chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }

    #messages-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
    }

    #session-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      background: var(--surface);
      min-height: 44px;
    }

    #session-header .meta {
      color: var(--text-muted);
      font-size: 12px;
    }

    #session-header .meta strong {
      color: var(--accent);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      min-width: 0;
    }

    #input-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
      background: var(--surface);
    }

    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      min-height: 38px;
      max-height: 120px;
      outline: none;
      line-height: 1.5;
      transition: border-color .15s;
    }

    #msg-input:focus {
      border-color: var(--accent);
    }

    /* config panel */
    #config-panel {
      width: 360px;
      min-width: 360px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #config-panel.open {
      display: flex;
    }

    #config-panel-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    #config-tree {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      overflow-y: auto;
      max-height: 220px;
      flex-shrink: 0;
    }

    .tree-folder {
      padding: 4px 14px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: .04em;
    }

    .tree-file {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 14px 4px 26px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      transition: background .1s;
    }

    .tree-file:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .tree-file.active {
      color: var(--accent);
      background: var(--accent-dim);
    }

    .tree-file .del-btn {
      opacity: 0;
      font-size: 11px;
      color: var(--red);
      cursor: pointer;
      padding: 0 4px;
    }

    .tree-file:hover .del-btn {
      opacity: 1;
    }

    .tree-new {
      padding: 3px 14px 3px 26px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .tree-new input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 7px;
      color: var(--text);
      font-size: 12px;
      outline: none;
    }

    .tree-new input:focus {
      border-color: var(--accent);
    }

    #config-editor-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #config-filename {
      padding: 8px 14px 4px;
      font-size: 12px;
      color: var(--accent);
      font-family: var(--mono);
      flex-shrink: 0;
    }

    #config-editor {
      flex: 1;
      background: var(--bg);
      border: none;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12.5px;
      padding: 12px 14px;
      resize: none;
      outline: none;
      line-height: 1.6;
    }

    #config-actions {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Message Bubbles ──────────────────────────────────────────────── */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 80%;
      flex-shrink: 0;
    }

    .msg.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg.assistant,
    .msg.tool {
      align-self: flex-start;
      align-items: flex-start;
    }

    .msg-role {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 0 4px;
    }

    .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      line-height: 1.6;
      max-width: 100%;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border-color: var(--accent-dim);
    }

    /* markdown in bubbles */
    .msg-bubble p {
      margin-bottom: 6px;
    }

    .msg-bubble p:last-child {
      margin-bottom: 0;
    }

    .msg-bubble code {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: var(--mono);
      font-size: 12.5px;
      color: var(--accent);
    }

    .msg-bubble pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 6px 0;
    }

    .msg-bubble pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: 12.5px;
    }

    /* code block copy */
    .code-block {
      position: relative;
      margin: 6px 0;
    }

    .code-block .copy-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 6px;
      opacity: 0;
      transition: opacity .15s;
      z-index: 5;
    }

    .code-block:hover .copy-btn {
      opacity: 1;
    }

    .code-block .copy-btn.copied {
      color: var(--green);
      border-color: var(--green);
    }

    /* message action buttons row — always visible below bubble */
    .msg-actions {
      display: flex;
      gap: 4px;
      margin-top: 2px;
    }

    .msg-act-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: var(--font);
      transition: color .12s, background .12s;
    }

    .msg-act-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .msg-act-btn.copied {
      color: var(--green);
    }

    .msg-bubble {
      position: relative;
    }

    .msg-bubble ul,
    .msg-bubble ol {
      padding-left: 18px;
      margin: 4px 0;
    }

    .msg-bubble li {
      margin: 2px 0;
    }

    .msg-bubble strong {
      color: var(--text);
      font-weight: 600;
    }

    .msg-bubble blockquote {
      border-left: 3px solid var(--border);
      padding-left: 10px;
      color: var(--text-muted);
      margin: 6px 0;
    }

    /* tool call block */
    .tool-block {
      background: var(--tool-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.35;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      flex-shrink: 0;
    }

    .tool-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 10px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: background .1s;
      min-width: 0;
    }

    .tool-header:hover {
      background: var(--surface2);
    }

    .tool-header.open {
      border-bottom-color: var(--border);
    }

    .tool-icon {
      color: var(--yellow);
      font-size: 13px;
    }

    .tool-name {
      color: var(--yellow);
      font-weight: 600;
      flex-shrink: 0;
    }

    .tool-summary {
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.3;
      margin-left: 8px;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tool-chevron {
      margin-left: auto;
      color: var(--text-muted);
      transition: transform .15s;
    }

    .tool-header.open .tool-chevron {
      transform: rotate(90deg);
    }

    .tool-body {
      padding: 4px 10px 5px;
      color: var(--text-muted);
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
    }

    .tool-body.open {
      display: block;
    }

    .tool-body pre,
    .result-body pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* tool result */
    .result-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.35;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      flex-shrink: 0;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      min-width: 0;
    }

    .result-header.open {
      border-bottom-color: var(--border);
    }

    .result-ok {
      color: var(--green);
    }

    .result-err {
      color: var(--red);
    }

    .result-body {
      padding: 4px 10px 5px;
      color: var(--text-muted);
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      overflow-x: auto;
    }

    .result-body.open {
      display: block;
    }

    .result-summary {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 8px;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Keep consecutive tool cards compact without tightening regular chat bubbles. */
    #messages > .tool-block + .tool-block,
    #messages > .tool-block + .result-block,
    #messages > .result-block + .tool-block,
    #messages > .result-block + .result-block,
    .thinking-content > .tool-block + .tool-block,
    .thinking-content > .tool-block + .result-block,
    .thinking-content > .result-block + .tool-block,
    .thinking-content > .result-block + .result-block {
      margin-top: -4px;
    }

    /* thinking */
    .thinking-block {
      color: var(--text-muted);
      font-size: 13px;
      border-left: 2px solid var(--border);
      border-radius: 0 4px 4px 0;
      width: 100%;
      flex-shrink: 0;
    }

    .thinking-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-style: italic;
      user-select: none;
    }

    .thinking-header:hover {
      background: var(--surface2);
    }

    .thinking-toggle {
      margin-left: auto;
      font-size: 11px;
      color: var(--accent);
      font-style: normal;
      white-space: nowrap;
    }

    .thinking-body {
      padding: 0 10px 8px 10px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-style: normal;
      font-size: 12px;
      line-height: 1.6;
    }

    .thinking-body.collapsed {
      display: none;
    }

    .thinking-content {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .thinking-text {
      white-space: pre-wrap;
    }

    .thinking-tool-card {
      width: 100%;
      min-width: 0;
    }

    .thinking-tool-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      min-width: 0;
      padding: 2px 8px;
      background: var(--tool-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.2;
      cursor: pointer;
    }

    .thinking-tool-inline.open {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }

    .thinking-tool-inline-body {
      display: none;
      width: 100%;
      padding: 4px 8px 6px;
      background: var(--tool-bg);
      border: 1px solid var(--border);
      border-top: none;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
    }

    .thinking-tool-inline-body.open {
      display: block;
    }

    .thinking-tool-inline-body pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* typing dots */
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      flex-shrink: 0;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: pulse 1.2s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: .2s;
    }

    .dot:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .3;
        transform: scale(.9);
      }

      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    /* ── Buttons ──────────────────────────────────────────────────────── */
    .btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font);
      transition: background .12s, border-color .12s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--surface);
      border-color: var(--text-muted);
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary:hover {
      background: #1c3a6e;
    }

    .btn-danger {
      border-color: var(--red);
      color: var(--red);
    }

    .btn-danger:hover {
      background: var(--red-dim);
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 12px;
    }

    .btn-icon {
      padding: 5px 8px;
      font-size: 15px;
      line-height: 1;
    }

    /* ── Modal ────────────────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .overlay.hidden {
      display: none;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      width: 440px;
      max-width: 95vw;
    }

    .modal h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .form-group select,
    .form-group textarea,
    .form-group input[type=text] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
      transition: border-color .15s;
    }

    .form-group select:focus,
    .form-group textarea:focus,
    .form-group input:focus {
      border-color: var(--accent);
    }

    .form-group select option {
      background: var(--surface2);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
      font-family: var(--mono);
      font-size: 12.5px;
    }

    /* ── Command bar (above input) ───────────────────────────────────── */
    #cmd-bar {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 0 12px 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    #cmd-bar.visible { display: flex; flex-direction: column; }
    #cmd-search-bar {
      width: 100%;
      background: var(--bg);
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      outline: none;
    }
    #cmd-bar-list {
      max-height: 180px;
      overflow-y: auto;
      padding: 4px;
    }
    .cmd-bar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 6px;
      font-size: 13px;
      transition: background .1s;
    }
    .cmd-bar-item:hover, .cmd-bar-item.selected {
      background: var(--surface2);
    }
    .cmd-bar-item .cmd-bar-name {
      font-weight: 600;
      color: var(--accent);
      font-family: var(--mono);
      min-width: 80px;
    }
    .cmd-bar-item .cmd-bar-title {
      color: var(--text);
      flex: 1;
    }
    .cmd-bar-item .cmd-bar-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      background: var(--accent-dim);
      color: var(--accent);
      white-space: nowrap;
    }
    .cmd-bar-item .cmd-bar-badge.project {
      background: var(--green-dim);
      color: var(--green);
    }
    #cmd-bar-hint {
      padding: 4px 12px 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    /* ── Toast ────────────────────────────────────────────────────────── */
    #toasts {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
    }

    .toast {
      padding: 9px 14px;
      border-radius: 6px;
      font-size: 13px;
      border: 1px solid;
      max-width: 320px;
      animation: slide-up .2s ease;
    }

    .toast-ok {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }

    .toast-err {
      background: var(--red-dim);
      border-color: var(--red);
      color: var(--red);
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    /* ── Empty state ──────────────────────────────────────────────────── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 12px;
    }

    #empty-state .big {
      font-size: 40px;
    }

    #empty-state p {
      font-size: 14px;
    }

    /* ── Scrollbars ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* misc */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    .hidden {
      display: none !important;
    }

    #error-banner {
      display: none;
      padding: 8px 16px;
      background: var(--red-dim);
      border-bottom: 1px solid var(--red);
      color: var(--red);
      font-size: 13px;
    }

    /* ── Approval flow ─────────────────────────────────────────────── */
    #confirm-panel {
      margin: 8px 16px 0;
      padding: 12px 16px;
      background: #2d2000;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
      flex-shrink: 0;
    }
    .confirm-header {
      color: #f59e0b;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .confirm-tool {
      background: #111;
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .confirm-tool strong { color: #e5e7eb; }
    .confirm-tool pre {
      margin: 6px 0 0;
      white-space: pre-wrap;
      color: #9ca3af;
      font-size: 12px;
      max-height: 180px;
      overflow-y: auto;
    }
    .confirm-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
    }
    .btn-approve { background: #16a34a; color: #fff; border: none; }
    .btn-approve:hover { background: #15803d; }
  </style>
</head>

<body>
  <div id="app">

    <!-- Top bar -->
    <div id="topbar">
      <h1>My<span>Harness</span>Py</h1>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="running-indicator" class="hidden" style="color:var(--green);font-size:12px">● 运行中</span>
        <button class="btn btn-primary btn-sm" onclick="openNewSession()">+ 新建会话</button>
      </div>
    </div>

    <div id="main">

      <!-- Sidebar -->
      <div id="sidebar">
        <div id="sidebar-scroll">

          <!-- Sessions -->
          <div class="sidebar-section">
            <div class="sidebar-label">会话</div>
            <div id="sessions-list">
              <div class="sidebar-item" style="color:var(--text-muted);font-size:12px;padding-left:16px">暂无会话</div>
            </div>
            <div id="archive-toggle" class="hidden" onclick="toggleArchiveFilter()">📦 显示已归档</div>
          </div>

          <div class="divider"></div>

          <!-- Skills -->
          <div class="sidebar-section">
            <div class="sidebar-label">Skills</div>
            <div id="skills-list">
              <div class="sidebar-item" style="color:var(--text-muted);font-size:12px;padding-left:16px">加载中…</div>
            </div>
          </div>

          <div class="divider"></div>

          <!-- Personas -->
          <div class="sidebar-section">
            <div class="sidebar-label">身份 Personas</div>
            <div id="personas-list">
              <div class="sidebar-item" style="color:var(--text-muted);font-size:12px;padding-left:16px">加载中…</div>
            </div>
          </div>
        </div>

        <!-- Sidebar bottom -->
        <div id="sidebar-bottom">
          <button class="btn btn-sm" style="width:100%" onclick="toggleConfig()">⚙ 配置文件</button>
        </div>
      </div>

      <!-- Chat area -->
      <div id="chat-wrap">
        <div id="session-header">
          <span id="session-title" style="font-size:13px;color:var(--text-muted)">未选择会话</span>
          <span id="session-meta" class="meta hidden"></span>
          <div style="margin-left:auto;display:flex;gap:6px">
            <button id="cancel-btn" class="btn btn-sm btn-danger hidden" onclick="cancelSession()">停止</button>
            <button id="delete-btn" class="btn btn-sm hidden" onclick="deleteSession()">关闭会话</button>
          </div>
        </div>

        <div id="error-banner" id="error-banner"></div>

        <!-- Messages or empty state -->
        <div id="messages-wrap">
          <div id="empty-state">
            <p>选择一个Persona新建会话</p>
            <button class="btn btn-primary" onclick="openNewSession()">+ 新建会话</button>
          </div>
          <div id="messages" class="hidden"></div>
        </div>

        <!-- Approval panel (shown when WAITING_CONFIRMATION) -->
        <div id="confirm-panel" class="hidden">
          <div class="confirm-header">⚠ Agent 请求执行高风险操作，请审批：</div>
          <div id="confirm-tool-info"></div>
          <div class="confirm-actions">
            <button class="btn btn-danger btn-sm" onclick="denyAction()">拒绝</button>
            <button class="btn btn-approve btn-sm" onclick="confirmAction()">允许执行</button>
          </div>
        </div>

        <div id="cmd-bar">
          <input type="text" id="cmd-search-bar" placeholder="搜索命令…" autocomplete="off"
            oninput="filterCommands()" onkeydown="handleCmdKey(event)">
          <div id="cmd-bar-list"></div>
          <div id="cmd-bar-hint">↑↓ 选择  Enter 填入输入框  Esc 关闭</div>
        </div>

        <div id="input-bar">
          <button class="btn btn-icon" onclick="showCommandBar()" title="命令面板 (Ctrl+K)" style="width:32px;height:32px;padding:0;font-size:16px;font-weight:700;flex-shrink:0;border-radius:6px;line-height:32px;text-align:center">/</button>
          <textarea id="msg-input" placeholder="输入消息，Shift+Enter 换行，Enter 发送…" rows="1"
            onkeydown="handleInputKey(event)" oninput="autoGrow(this)"></textarea>
          <button class="btn btn-primary" onclick="sendMessage()" id="send-btn">发送</button>
        </div>
      </div>

      <!-- Config panel -->
      <div id="config-panel">
        <div id="config-panel-header">
          <span>配置文件</span>
          <button class="btn-icon btn" onclick="toggleConfig()" title="关闭">✕</button>
        </div>
        <div id="config-tree"></div>
        <div id="config-editor-wrap">
          <div id="config-filename" style="color:var(--text-muted);font-style:italic">← 选择文件编辑</div>
          <textarea id="config-editor" placeholder="选择左侧文件…" disabled></textarea>
          <div id="config-actions">
            <button class="btn btn-primary btn-sm" onclick="saveConfigFile()" id="config-save-btn" disabled>保存</button>
            <button class="btn btn-sm btn-danger" onclick="deleteConfigFile()" id="config-del-btn" disabled>删除</button>
            <span id="config-status"
              style="font-size:12px;color:var(--text-muted);margin-left:4px;align-self:center"></span>
          </div>
        </div>
      </div>

    </div><!-- #main -->
  </div><!-- #app -->

  <!-- New Session Modal -->
  <div id="modal-overlay" class="overlay hidden">
    <div class="modal">
      <h2>新建会话</h2>
      <div class="form-group">
        <label>Provider</label>
        <select id="sel-provider"></select>
      </div>
      <div class="form-group">
        <label>Persona（Agent 的身份与权限）</label>
        <select id="sel-persona">
          <option value="">— 不使用 Persona —</option>
        </select>
        <div id="persona-desc" style="font-size:12px;color:var(--text-muted);margin-top:4px;min-height:16px"></div>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="createSession()">创建</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirm-overlay" class="overlay hidden">
    <div class="modal" style="width:380px">
      <h2 id="confirm-title">确认操作</h2>
      <p id="confirm-message" style="color:var(--text-muted);margin-bottom:16px;line-height:1.6"></p>
      <div class="modal-actions">
        <button class="btn" id="confirm-cancel-btn">取消</button>
        <button class="btn btn-danger" id="confirm-ok-btn">确认</button>
      </div>
    </div>
  </div>

  <!-- Session context menu dropdown -->
  <div id="session-dropdown"></div>

  <!-- Toasts -->
  <div id="toasts"></div>

  <script>
    'use strict';

    // ── State ────────────────────────────────────────────────────────────
    let currentSessionId = null;
    let pollTimer = null;
    let sessionRefreshTimer = null;
    let lastMsgCount = 0;
    let overview = { skills: [], personas: [], providers: [], default_provider: '' };
    let currentConfigFile = null;  // { type: 'skill'|'persona'|'yaml', name: string }
    let allSessions = [];
    let ws = null;               // active WebSocket
    let streamEl = null;         // current streaming bubble DOM node
    let streamText = '';         // accumulated text token text
    let streamThinkingText = ''; // accumulated thinking token text
    let streamIsThinking = false;
    let pendingUserEchoes = [];
    let activeThinkingGroup = null;
    let showArchived = false;    // archive filter toggle
    let allCommands = [];       // command list from GET /commands
    let filteredCommands = [];  // search-filtered subset
    let selectedCmdIndex = -1;  // index in filteredCommands
    let menuSessionId = null;    // which session's menu is open
    // Poll deduplication: at most one doPoll in-flight + one queued
    let doPollInFlight = false;
    let doPollQueued  = false;

    // ── Boot ─────────────────────────────────────────────────────────────
    async function boot() {
      await loadOverview();
      await refreshSessions();
      fetchCommands();
    }

    async function loadOverview() {
      try {
        const r = await api('/config/overview');
        overview = r;
        renderSidebar();
        populateModal();
      } catch (e) { toast('加载配置失败: ' + e.message, true); }
    }

    async function refreshSessions() {
      try {
        const r = await api('/sessions');
        allSessions = r.sessions || [];
        renderSessionsList();
      } catch (e) { }
    }

    // ── Render Sidebar ───────────────────────────────────────────────────
    function renderSidebar() {
      // Skills
      const sl = document.getElementById('skills-list');
      sl.innerHTML = '';
      if (!overview.skills.length) {
        sl.innerHTML = '<div class="sidebar-item" style="color:var(--text-muted);font-size:12px;padding-left:16px">暂无 Skill</div>';
      } else {
        overview.skills.forEach(s => {
          const el = div('sidebar-item', `🔧 ${s.name}`);
          el.title = s.description || s.name;
          el.onclick = () => loadConfigFile('skill', s.name);
          sl.appendChild(el);
        });
      }

      // Personas
      const pl = document.getElementById('personas-list');
      pl.innerHTML = '';
      if (!overview.personas.length) {
        pl.innerHTML = '<div class="sidebar-item" style="color:var(--text-muted);font-size:12px;padding-left:16px">暂无 Persona</div>';
      } else {
        overview.personas.forEach(p => {
          const el = div('sidebar-item', `👤 ${p.name}`);
          el.title = p.description || p.name;
          el.onclick = () => openNewSession(p.name);
          pl.appendChild(el);
        });
      }
    }

    function renderSessionsList() {
      const sl = document.getElementById('sessions-list');
      sl.innerHTML = '';
      // Sort: pinned first, then by order from backend (already sorted)
      const sorted = [...allSessions].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
      const visible = showArchived ? sorted : sorted.filter(s => !s.archived);
      const hasArchived = allSessions.some(s => s.archived);

      // Show archive toggle
      const archiveToggle = document.getElementById('archive-toggle');
      if (hasArchived || showArchived) {
        archiveToggle.classList.remove('hidden');
        archiveToggle.textContent = showArchived ? '📦 隐藏已归档' : `📦 显示已归档 (${allSessions.filter(s => s.archived).length})`;
      } else {
        archiveToggle.classList.add('hidden');
      }

      if (!visible.length) {
        sl.innerHTML = '<div class="sidebar-item" style="color:var(--text-muted);font-size:12px;padding-left:16px">暂无会话</div>';
        return;
      }
      visible.forEach(s => {
        const stateClass = s.state === 'RUNNING' ? 'badge-run' : s.state === 'ERROR' ? 'badge-err' : 'badge-done';
        const stateText = s.state === 'RUNNING' ? '运行' : s.state === 'ERROR' ? '错误' : s.state === 'WAITING_INPUT' ? '等待' : '完成';
        const labelText = s.display_name || (s.persona ? `👤 ${s.persona}` : `💬 ${s.session_id.slice(0, 8)}`);

        const el = document.createElement('div');
        el.className = 'sidebar-item' + (s.session_id === currentSessionId ? ' active' : '');
        el.onclick = (e) => {
          // Don't switch if clicking the menu button
          if (e.target.classList.contains('session-menu-btn')) return;
          switchSession(s.session_id);
        };

        // Pin icon
        if (s.pinned) {
          const pin = document.createElement('span');
          pin.className = 'pin-icon';
          pin.textContent = '📌';
          pin.title = '已置顶';
          el.appendChild(pin);
        }

        // Label
        const label = document.createElement('span');
        label.className = 'session-label';
        label.textContent = labelText;
        label.title = labelText;
        label.dataset.sessionId = s.session_id;
        el.appendChild(label);

        // Archived indicator
        if (s.archived) {
          const arch = document.createElement('span');
          arch.style.cssText = 'font-size:10px;flex-shrink:0;opacity:.5';
          arch.textContent = '📦';
          arch.title = '已归档';
          el.appendChild(arch);
        }

        // State badge
        const badge = div('badge ' + stateClass, stateText);
        el.appendChild(badge);

        // Menu button
        const menuBtn = document.createElement('span');
        menuBtn.className = 'session-menu-btn';
        menuBtn.textContent = '⋯';
        menuBtn.title = '更多操作';
        menuBtn.onclick = (e) => { e.stopPropagation(); openSessionMenu(e, s); };
        el.appendChild(menuBtn);

        sl.appendChild(el);
      });
    }

    // ── Modal ─────────────────────────────────────────────────────────────
    function populateModal() {
      const provSel = document.getElementById('sel-provider');
      provSel.innerHTML = '';
      overview.providers.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p; opt.textContent = p;
        if (p === overview.default_provider) opt.selected = true;
        provSel.appendChild(opt);
      });

      const persSel = document.getElementById('sel-persona');
      persSel.innerHTML = '<option value="">— 不使用 Persona —</option>';
      overview.personas.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.description ? `${p.name} — ${p.description}` : p.name;
        opt.dataset.desc = p.description || '';
        persSel.appendChild(opt);
      });

      // Show persona description on change
      persSel.onchange = () => {
        const selected = persSel.options[persSel.selectedIndex];
        const descEl = document.getElementById('persona-desc');
        if (descEl) descEl.textContent = selected ? (selected.dataset.desc || '') : '';
      };
    }

    function openNewSession(prePersona = '') {
      document.getElementById('modal-overlay').classList.remove('hidden');
      if (prePersona) {
        document.getElementById('sel-persona').value = prePersona;
        document.getElementById('sel-persona').dispatchEvent(new Event('change'));
      }
    }
    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
      document.getElementById('sel-persona').value = '';
      const descEl = document.getElementById('persona-desc');
      if (descEl) descEl.textContent = '';
    }

    async function createSession() {
      const btn = document.querySelector('#modal-overlay .btn-primary');
      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = '创建中…';

      const persona = document.getElementById('sel-persona').value;
      const provider = document.getElementById('sel-provider').value;

      const body = { provider };
      if (persona) body.persona = persona;

      try {
        const r = await api('/sessions', 'POST', body);
        closeModal();
        toast('会话已创建');
        await refreshSessions();
        switchSession(r.session_id);
      } catch (e) {
        toast('创建失败: ' + e.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = '创建';
      }
    }

    // ── Session management ────────────────────────────────────────────────
    async function switchSession(id) {
      stopPolling();
      disconnectWS();
      currentSessionId = id;
      lastMsgCount = 0;
      pendingUserEchoes = [];
      activeThinkingGroup = null;
      doPollInFlight = false;
      doPollQueued  = false;
      renderSessionsList();
      showChatArea();

      // Load initial state
      try {
        const snap = await api(`/sessions/${id}/state`);
        renderSnapshot(snap);
        if (snap.is_running) startPolling();
      } catch (e) { toast('加载会话失败: ' + e.message, true); }

      connectWS(id);
    }

    function showChatArea() {
      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('messages').classList.remove('hidden');
      document.getElementById('messages').innerHTML = '';
      activeThinkingGroup = null;
      document.getElementById('delete-btn').classList.remove('hidden');
    }

    async function deleteSession() {
      if (!currentSessionId) return;
      if (!await showConfirm('关闭会话', '确定要关闭当前会话吗？')) return;
      try {
        await api(`/sessions/${currentSessionId}`, 'DELETE');
        stopPolling();
        disconnectWS();
        currentSessionId = null;
        lastMsgCount = 0;
        activeThinkingGroup = null;
        document.getElementById('messages').classList.add('hidden');
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('session-title').textContent = '未选择会话';
        document.getElementById('session-meta').classList.add('hidden');
        document.getElementById('delete-btn').classList.add('hidden');
        document.getElementById('cancel-btn').classList.add('hidden');
        await refreshSessions();
        toast('会话已关闭');
      } catch (e) { toast('关闭失败: ' + e.message, true); }
    }

    async function confirmAction() {
      if (!currentSessionId) return;
      // Immediately hide panel (optimistic update — don't wait for server round-trip)
      document.getElementById('confirm-panel').classList.add('hidden');
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'confirm' }));
      } else {
        await api(`/sessions/${currentSessionId}/confirm`, 'POST');
        doPoll();
      }
    }

    async function denyAction() {
      if (!currentSessionId) return;
      // Immediately hide panel
      document.getElementById('confirm-panel').classList.add('hidden');
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'deny' }));
      } else {
        await api(`/sessions/${currentSessionId}/deny`, 'POST');
        doPoll();
      }
    }

    async function cancelSession() {
      if (!currentSessionId) return;
      try {
        await api(`/sessions/${currentSessionId}/cancel`, 'POST');
        toast('已发送停止信号');
      } catch (e) { toast('停止失败: ' + e.message, true); }
    }

    // ── Session context menu ───────────────────────────────────────────────
    function openSessionMenu(e, session) {
      e.stopPropagation();
      const dropdown = document.getElementById('session-dropdown');
      const rect = e.target.getBoundingClientRect();
      dropdown.style.top = rect.bottom + 4 + 'px';
      dropdown.style.left = Math.min(rect.left, window.innerWidth - 160) + 'px';

      const isPinned = session.pinned;
      const isArchived = session.archived;
      dropdown.innerHTML = `
        <div class="menu-item" data-action="rename">✏️ 重命名</div>
        <div class="menu-item" data-action="pin">${isPinned ? '📌 取消置顶' : '📌 置顶'}</div>
        <div class="menu-item" data-action="archive">${isArchived ? '📤 取消归档' : '📦 归档'}</div>
        <div class="menu-item danger" data-action="delete">🗑 删除</div>
      `;

      // Bind click handlers
      dropdown.querySelector('[data-action="rename"]').onclick = () => renameSession(session);
      dropdown.querySelector('[data-action="pin"]').onclick = () => togglePin(session);
      dropdown.querySelector('[data-action="archive"]').onclick = () => toggleArchive(session);
      dropdown.querySelector('[data-action="delete"]').onclick = () => deleteSessionFromMenu(session);

      dropdown.classList.add('open');
      menuSessionId = session.session_id;

      // Close on outside click
      setTimeout(() => {
        document.addEventListener('click', closeSessionMenu, { once: true });
      }, 0);
    }

    function closeSessionMenu() {
      const dropdown = document.getElementById('session-dropdown');
      dropdown.classList.remove('open');
      menuSessionId = null;
    }

    function renameSession(session) {
      closeSessionMenu();
      // Find the label span in the sidebar
      const label = document.querySelector(`.session-label[data-session-id="${session.session_id}"]`);
      if (!label) return;
      const current = session.display_name || session.persona || session.session_id.slice(0, 8);
      const input = document.createElement('input');
      input.type = 'text';
      input.value = current;
      input.className = 'session-rename-input';
      input.style.cssText = 'background:var(--bg);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-size:13px;padding:2px 6px;width:100%;outline:none;font-family:var(--font)';
      label.replaceWith(input);
      input.focus();
      input.select();

      const commit = async () => {
        const name = input.value.trim();
        // Restore label
        const newLabel = document.createElement('span');
        newLabel.className = 'session-label';
        newLabel.textContent = name || current;
        newLabel.title = name || current;
        newLabel.dataset.sessionId = session.session_id;
        input.replaceWith(newLabel);
        if (name && name !== current) {
          try {
            await api(`/sessions/${session.session_id}`, 'PATCH', { display_name: name });
            await refreshSessions();
            toast('已重命名');
          } catch (e) { toast('重命名失败: ' + e.message, true); }
        }
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { const l = document.createElement('span'); l.className = 'session-label'; l.textContent = current; l.title = current; l.dataset.sessionId = session.session_id; input.replaceWith(l); }
      });
      input.addEventListener('blur', commit);
    }

    async function togglePin(session) {
      closeSessionMenu();
      try {
        await api(`/sessions/${session.session_id}`, 'PATCH', { pinned: !session.pinned });
        await refreshSessions();
        toast(session.pinned ? '已取消置顶' : '已置顶');
      } catch (e) { toast('操作失败: ' + e.message, true); }
    }

    async function toggleArchive(session) {
      closeSessionMenu();
      try {
        await api(`/sessions/${session.session_id}`, 'PATCH', { archived: !session.archived });
        await refreshSessions();
        toast(session.archived ? '已取消归档' : '已归档');
      } catch (e) { toast('操作失败: ' + e.message, true); }
    }

    async function deleteSessionFromMenu(session) {
      closeSessionMenu();
      if (!await showConfirm('删除会话', `确认删除会话「${session.display_name || session.session_id.slice(0, 8)}」？此操作不可恢复。`)) return;
      try {
        await api(`/sessions/${session.session_id}`, 'DELETE');
        if (session.session_id === currentSessionId) {
          stopPolling();
          disconnectWS();
          currentSessionId = null;
          lastMsgCount = 0;
          activeThinkingGroup = null;
          document.getElementById('messages').classList.add('hidden');
          document.getElementById('empty-state').classList.remove('hidden');
          document.getElementById('session-title').textContent = '未选择会话';
          document.getElementById('session-meta').classList.add('hidden');
          document.getElementById('delete-btn').classList.add('hidden');
          document.getElementById('cancel-btn').classList.add('hidden');
        }
        await refreshSessions();
        toast('已删除');
      } catch (e) { toast('删除失败: ' + e.message, true); }
    }

    function toggleArchiveFilter() {
      showArchived = !showArchived;
      renderSessionsList();
    }

    // ── Messaging ─────────────────────────────────────────────────────────
    async function sendMessage() {
      const inp = document.getElementById('msg-input');
      const btn = document.getElementById('send-btn');
      const text = inp.value.trim();
      if (!text || !currentSessionId || btn.disabled) return;

      // Detect slash commands in the input
      if (text.startsWith('/')) {
        await _handleSlashInput(text, inp, btn);
        return;
      }

      btn.disabled = true;
      inp.value = '';
      autoGrow(inp);

      try {
        appendOptimisticUserMessage(text);
        await api(`/sessions/${currentSessionId}/messages`, 'POST', { text });
        triggerPoll();
        if (!ws || ws.readyState !== WebSocket.OPEN) startPolling();
        document.getElementById('cancel-btn').classList.remove('hidden');
      } catch (e) {
        rollbackOptimisticUserMessage(text);
        toast('发送失败: ' + e.message, true);
      } finally {
        btn.disabled = false;
        inp.focus();
      }
    }

    async function _handleSlashInput(text, inp, btn) {
      hideCommandBar();
      // Parse: /command_id arg1 arg2 ...
      const parts = text.slice(1).trim().split(/\s+/);
      const cmdName = parts[0];
      const cmd = _findCommand(cmdName);

      if (!cmd) {
        // Not a command — send as-is (skill fallback or plain text)
        btn.disabled = true;
        inp.value = '';
        autoGrow(inp);
        try {
          appendOptimisticUserMessage(text);
          await api(`/sessions/${currentSessionId}/messages`, 'POST', { text });
          triggerPoll();
          if (!ws || ws.readyState !== WebSocket.OPEN) startPolling();
          document.getElementById('cancel-btn').classList.remove('hidden');
        } catch (e) {
          rollbackOptimisticUserMessage(text);
          toast('发送失败: ' + e.message, true);
        } finally {
          btn.disabled = false;
          inp.focus();
        }
        return;
      }

      // Build args from positional params
      const rawArgs = parts.slice(1);
      const args = {};
      if (cmd.has_params && rawArgs.length > 0) {
        for (let i = 0; i < Math.min(cmd.params.length, rawArgs.length); i++) {
          args[cmd.params[i]] = rawArgs[i];
        }
      }

      // Show the command in chat so the user sees what was sent
      appendOptimisticUserMessage(text);
      inp.value = '';
      autoGrow(inp);
      btn.disabled = true;

      try {
        await executeCommand(cmd.id, args);
      } catch (e) {
        toast('命令执行失败: ' + e.message, true);
      } finally {
        btn.disabled = false;
        inp.focus();
      }
    }

    function _findCommand(name) {
      // Resolve by exact ID or short-name match (same as backend resolve())
      const exact = allCommands.find(c => c.id === name);
      if (exact) return exact;
      const short = allCommands.find(c => c.id.endsWith(':' + name));
      if (short) return short;
      return null;
    }

    function handleInputKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
        return;
      }
      if ((e.key === 'k' || e.key === 'K') && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        showCommandBar();
        return;
      }
      // Typing "/" in an empty input opens the command bar with text sync
      if (e.key === '/' && e.target.value.trim() === '') {
        setTimeout(() => showCommandBar(e.target.value), 10);
      }
    }

    function autoGrow(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
      // Sync command bar search when input starts with /
      const bar = document.getElementById('cmd-bar');
      if (bar && bar.classList.contains('visible')) {
        if (el.value.startsWith('/')) {
          const searchInput = document.getElementById('cmd-search-bar');
          if (searchInput) {
            searchInput.value = el.value.replace(/^\//, '');
            filterCommands();
          }
        } else {
          hideCommandBar();
        }
      }
    }

    // ── Polling ───────────────────────────────────────────────────────────
    function startPolling() {
      if (pollTimer) return;
      pollTimer = setInterval(doPoll, 800);
      // Refresh the session list every 3s while running so sub-agent sessions appear
      sessionRefreshTimer = setInterval(refreshSessions, 3000);
    }

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      if (sessionRefreshTimer) { clearInterval(sessionRefreshTimer); sessionRefreshTimer = null; }
      document.getElementById('running-indicator').classList.add('hidden');
      document.getElementById('cancel-btn').classList.add('hidden');
    }

    // ── WebSocket streaming ───────────────────────────────────────────────
    function connectWS(sessionId) {
      disconnectWS();
      streamEl = null; streamText = ''; streamThinkingText = ''; streamIsThinking = false;
      const wsUrl = location.origin.replace(/^http/, 'ws') + '/ws/' + sessionId;
      ws = new WebSocket(wsUrl);
      ws.onmessage = handleWsFrame;
      ws.onclose = () => { ws = null; if (currentSessionId) startPolling(); }; // fallback if WS drops
    }

    function disconnectWS() {
      if (ws) { ws.onclose = null; ws.close(); ws = null; }
      if (streamEl) { streamEl.remove(); streamEl = null; }
      streamText = ''; streamThinkingText = ''; streamIsThinking = false;
    }

    function handleWsFrame(ev) {
      let frame;
      try { frame = JSON.parse(ev.data); } catch { return; }
      const container = document.getElementById('messages');
      if (!container) return;

      if (frame.type === 'thinking') {
        ensureStreamEl(container);
        streamIsThinking = true;
        streamText = '';
        streamThinkingText = '';
        streamEl.querySelector('.msg-bubble').innerHTML =
          '<em style="color:var(--text-muted);font-style:italic">💭 正在思考…</em>';

      } else if (frame.type === 'thinking_token') {
        streamThinkingText += frame.data;
        ensureStreamEl(container);
        const bubble = streamEl.querySelector('.msg-bubble');
        // Build scrollable structure on first token
        let thinkBody = bubble.querySelector('.thinking-stream-body');
        if (!thinkBody) {
          bubble.innerHTML =
            '<em style="color:var(--text-muted);font-style:italic">💭 思考中…</em>' +
            '<div class="thinking-stream-body" style="max-height:160px;overflow-y:auto;' +
            'font-size:12px;color:var(--text-muted);white-space:pre-wrap;' +
            'padding:4px 0;margin-top:4px;line-height:1.6"></div>';
          thinkBody = bubble.querySelector('.thinking-stream-body');
        }
        thinkBody.textContent = streamThinkingText;
        thinkBody.scrollTop = thinkBody.scrollHeight;
        container.scrollTop = container.scrollHeight;

      } else if (frame.type === 'token') {
        if (streamIsThinking) { streamIsThinking = false; streamText = ''; streamThinkingText = ''; }
        ensureStreamEl(container);
        streamText += frame.data;
        streamEl.querySelector('.msg-bubble').textContent = streamText;
        container.scrollTop = container.scrollHeight;

      } else if (frame.type === 'message') {
        // A message completed (tool call or tool result). Trigger an incremental
        // snapshot fetch so renderSnapshot() is the single source of truth.
        // This avoids lastMsgCount desync from direct rendering + doPoll races.
        const m = frame.data;
        const isToolActivity =
          (m?.role === 'assistant' && (m.content || []).some(b => b.type === 'tool_call')) ||
          m?.role === 'tool';
        if (isToolActivity) {
          triggerPoll();
          // If a spawn_agent/spawn_agents call was made, refresh the session list
          // after a short delay so new sub-agent sessions appear in the sidebar.
          const hasSpawnCall = m?.role === 'assistant' && (m.content || []).some(
            b => b.type === 'tool_call' && (b.tool_name === 'spawn_agent' || b.tool_name === 'spawn_agents')
          );
          if (hasSpawnCall) {
            setTimeout(refreshSessions, 600);
            setTimeout(refreshSessions, 2500);
          }
        }

      } else if (frame.type === 'state') {
        // Always re-render on state change so confirm panel hides immediately after approve/deny
        if (frame.data && !frame.data.is_running) {
          triggerPoll();   // final state: clear stream el, append complete messages
        } else if (frame.data) {
          triggerPoll();   // mid-run state update (e.g. RUNNING after confirm)
        }

      } else if (frame.type === 'error') {
        toast('引擎错误: ' + (frame.data?.detail || JSON.stringify(frame.data)), true);
      }
    }

    function ensureStreamEl(container) {
      if (streamEl) return;
      streamEl = document.createElement('div');
      streamEl.className = 'msg assistant';
      streamEl.innerHTML = '<div class="msg-role">Assistant</div><div class="msg-bubble"></div>';
      const dots = document.getElementById('typing-dots');
      if (dots) container.insertBefore(streamEl, dots);
      else container.appendChild(streamEl);
    }

    // Trigger an immediate incremental poll, deduplicating concurrent calls.
    // At most one doPoll runs at a time; if another arrives while in-flight,
    // it is queued and runs once the current one completes.
    function triggerPoll() {
      if (doPollInFlight) { doPollQueued = true; return; }
      doPollInFlight = true;
      doPoll().finally(() => {
        doPollInFlight = false;
        if (doPollQueued) { doPollQueued = false; triggerPoll(); }
      });
    }

    async function doPoll() {
      if (!currentSessionId) { stopPolling(); return; }
      try {
        const snap = await api(`/sessions/${currentSessionId}/state`);
        renderSnapshot(snap);
        if (!snap.is_running) {
          stopPolling();
          await refreshSessions();
        }
      } catch (e) { }
    }

    // ── Rendering ─────────────────────────────────────────────────────────
    function renderSnapshot(snap) {
      // Remove streaming bubble only when the engine finishes — while still running,
      // the bubble is owned by the WS token stream and must not be cleared by polling.
      if (streamEl && !snap.is_running) { streamEl.remove(); streamEl = null; streamText = ''; streamThinkingText = ''; streamIsThinking = false; }

      const msgs = snap.last_messages || [];
      const meta = snap.meta || {};

      // Header — use display_name if set
      const titleEl = document.getElementById('session-title');
      const metaEl = document.getElementById('session-meta');
      const sessionInfo = allSessions.find(s => s.session_id === currentSessionId);
      const dname = sessionInfo?.display_name || '';
      titleEl.textContent = dname || currentSessionId.slice(0, 8);
      const parts = [];
      if (meta.skill) parts.push(`Skill: <strong>${meta.skill}</strong>`);
      if (meta.persona) parts.push(`Persona: <strong>${meta.persona}</strong>`);
      if (meta.provider) parts.push(meta.provider);
      if (parts.length) {
        metaEl.innerHTML = parts.join(' &nbsp;·&nbsp; ');
        metaEl.classList.remove('hidden');
      }

      // Running indicator (hide during confirmation — user sees the approval panel instead)
      if (snap.is_running && snap.state !== 'WAITING_CONFIRMATION') {
        document.getElementById('running-indicator').classList.remove('hidden');
        document.getElementById('cancel-btn').classList.remove('hidden');
      }

      // Error banner
      const errBanner = document.getElementById('error-banner');
      if (snap.state === 'ERROR') {
        errBanner.style.display = 'block';
        errBanner.textContent = '⚠ 引擎出错：' + (snap.last_error || '').split('\n').slice(-1)[0];
      } else {
        errBanner.style.display = 'none';
      }

      // Approval panel
      const confirmPanel = document.getElementById('confirm-panel');
      const confirmInfo = document.getElementById('confirm-tool-info');
      if (snap.state === 'WAITING_CONFIRMATION' && snap.pending_approval?.length) {
        confirmInfo.innerHTML = snap.pending_approval.map(t => {
          const inputStr = JSON.stringify(t.input, null, 2);
          return `<div class="confirm-tool"><strong>${escHtml(t.name)}</strong><pre>${escHtml(inputStr)}</pre></div>`;
        }).join('');
        confirmPanel.classList.remove('hidden');
        // Remove typing dots while waiting for user input
        const dotsEl = document.getElementById('typing-dots');
        if (dotsEl) dotsEl.remove();
      } else {
        confirmPanel.classList.add('hidden');
      }

      // Render only new messages
      const container = document.getElementById('messages');
      const prevCount = lastMsgCount;
      lastMsgCount = msgs.length;

      for (let i = prevCount; i < msgs.length; i++) {
        try {
          renderMessage(container, msgs[i]);
        } catch(err) {
          console.error('[renderMessage] failed for msg index', i, msgs[i], err);
        }
      }

      // If new messages were rendered while the engine is still running,
      // the streaming bubble now shows stale text from a completed LLM turn.
      // Reset it so the next LLM turn starts with a fresh streaming bubble.
      if (prevCount < lastMsgCount && snap.is_running && streamEl) {
        streamEl.remove(); streamEl = null;
        streamText = ''; streamThinkingText = ''; streamIsThinking = false;
      }

      // Typing dots
      let dotsEl = document.getElementById('typing-dots');
      if (snap.is_running) {
        if (!dotsEl) {
          dotsEl = document.createElement('div');
          dotsEl.id = 'typing-dots';
          dotsEl.className = 'typing-dots';
          dotsEl.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
          container.appendChild(dotsEl);
        }
      } else if (dotsEl) {
        dotsEl.remove();
      }

      // Scroll to bottom
      container.scrollTop = container.scrollHeight;
    }

    function renderMessage(container, m) {
      const role = m.role;
      const content = m.content || [];

      if (role === 'user') {
        const text = content.filter(b => b.type === 'text').map(b => b.text).join('\n');
        if (!text) return;
        if (reconcileOptimisticUserMessage(text)) return;
        const el = div('msg user');
        el.innerHTML = `<div class="msg-role">You</div><div class="msg-bubble">${escHtml(text).replace(/\n/g, '<br>')}</div>`;
        container.appendChild(el);
        return;
      }

      if (role === 'assistant') {
        const textBlocks = content.filter(b => b.type === 'text' && b.text);
        const toolCalls = content.filter(b => b.type === 'tool_call');
        const thinkBlocks = content.filter(b => b.type === 'thinking' && b.thinking);

        if (thinkBlocks.length) {
          thinkBlocks.forEach(tb => {
            const el = document.createElement('div');
            el.className = 'thinking-block';
            el.innerHTML =
              `<div class="thinking-header">` +
              `<span>💭 思考过程</span>` +
              `<span style="font-size:11px">(${tb.thinking.length} 字)</span>` +
              `<span class="thinking-toggle">展开 ▼</span>` +
              `</div>` +
              `<div class="thinking-body collapsed">${escHtml(tb.thinking)}</div>`;
            el.querySelector('.thinking-header').addEventListener('click', () => {
              const body = el.querySelector('.thinking-body');
              const toggle = el.querySelector('.thinking-toggle');
              const collapsed = body.classList.toggle('collapsed');
              toggle.textContent = collapsed ? '展开 ▼' : '收起 ▲';
            });
            container.appendChild(el);
          });
        }

        toolCalls.forEach(tc => {
          container.appendChild(renderToolCall(tc));
        });

        if (textBlocks.length) {
          const raw = textBlocks.map(b => b.text).join('\n\n');
          const el = div('msg assistant');
          el.innerHTML = `<div class="msg-role">Assistant</div><div class="msg-bubble">${mdToHtml(raw)}</div>`;
          container.appendChild(el);
        }
        return;
      }

      if (role === 'tool') {
        content.filter(b => b.type === 'tool_result').forEach(tr => {
          // think tool result is already shown via the tool-call block — skip duplicate
          if (tr.tool_name === 'think') return;
          container.appendChild(renderToolResult(tr));
        });
      }
    }

    function renderToolCall(tc) {
      // think tool: render as a collapsible thinking block instead of a generic tool block
      if (tc.tool_name === 'think') {
        const thought = (tc.tool_input?.thought || '').trim();
        const wrap = document.createElement('div');
        wrap.className = 'thinking-block';
        wrap.innerHTML =
          `<div class="thinking-header">` +
          `<span>💭 思考过程</span>` +
          `<span style="font-size:11px;margin-left:6px;color:var(--text-muted)">(${thought.length} 字)</span>` +
          `<span class="thinking-toggle" style="margin-left:auto">展开 ▼</span>` +
          `</div>` +
          `<div class="thinking-body collapsed" style="white-space:pre-wrap">${escHtml(thought)}</div>`;
        wrap.querySelector('.thinking-header').addEventListener('click', () => {
          const body = wrap.querySelector('.thinking-body');
          const toggle = wrap.querySelector('.thinking-toggle');
          const collapsed = body.classList.toggle('collapsed');
          toggle.textContent = collapsed ? '展开 ▼' : '收起 ▲';
        });
        return wrap;
      }

      // spawn_agents: expanded card showing each agent's task
      if (tc.tool_name === 'spawn_agents') {
        let agents = tc.tool_input?.agents || [];
        // LLM sometimes serializes the array as a JSON string — parse it back
        if (typeof agents === 'string') {
          try { agents = JSON.parse(agents); } catch { agents = []; }
        }
        if (!Array.isArray(agents)) agents = [];
        const agentItems = agents.map((a, i) => {
          const task = a.task || '';
          return `<div style="padding:5px 0;display:flex;gap:8px;align-items:flex-start;border-bottom:1px solid var(--border)">` +
            `<span style="color:var(--green);font-size:11px;white-space:nowrap;margin-top:2px;min-width:54px">Agent ${i + 1}</span>` +
            `<span style="font-size:12px;color:var(--text)">${escHtml(task.slice(0, 120))}${task.length > 120 ? '…' : ''}</span>` +
            `</div>`;
        }).join('');
        const wrap = document.createElement('div');
        wrap.className = 'tool-block';
        wrap.innerHTML =
          `<div class="tool-header open" onclick="toggleCollapse(this)">` +
          `<span class="tool-icon">🤖</span>` +
          `<span class="tool-name" style="color:var(--green)">spawn_agents</span>` +
          `<span class="tool-summary">${agents.length} 个子 Agent 并行</span>` +
          `<span class="tool-chevron">▶</span>` +
          `</div>` +
          `<div class="tool-body open" style="padding:4px 10px">${agentItems || '<em style="color:var(--text-muted);font-size:12px">（无 agents）</em>'}</div>`;
        return wrap;
      }

      // spawn_agent: expanded card showing the task
      if (tc.tool_name === 'spawn_agent') {
        const task = tc.tool_input?.task || '';
        const wrap = document.createElement('div');
        wrap.className = 'tool-block';
        wrap.innerHTML =
          `<div class="tool-header open" onclick="toggleCollapse(this)">` +
          `<span class="tool-icon">🤖</span>` +
          `<span class="tool-name" style="color:var(--green)">spawn_agent</span>` +
          `<span class="tool-summary">${escHtml(task.slice(0, 60))}${task.length > 60 ? '…' : ''}</span>` +
          `<span class="tool-chevron">▶</span>` +
          `</div>` +
          `<div class="tool-body open" style="padding:6px 10px;font-size:12px;color:var(--text);white-space:pre-wrap">${escHtml(task)}</div>`;
        return wrap;
      }

      const inputStr = JSON.stringify(tc.tool_input || {}, null, 2);
      const wrap = document.createElement('div');
      wrap.className = 'tool-block';
      wrap.innerHTML = `
    <div class="tool-header" onclick="toggleCollapse(this)">
      <span class="tool-icon">🔧</span>
      <span class="tool-name">${escHtml(tc.tool_name)}</span>
      <span class="tool-summary">${shortInput(tc.tool_input)}</span>
      <span class="tool-chevron">▶</span>
    </div>
    <div class="tool-body"><pre>${escHtml(inputStr)}</pre></div>`;
      return wrap;
    }

    function renderToolResult(tr) {
      const isErr = tr.is_error;
      const content = tr.content || '';
      const toolLabel = tr.tool_name ? escHtml(tr.tool_name) : '工具结果';
      const preview = content.slice(0, 200) + (content.length > 200 ? '…' : '');
      const wrap = document.createElement('div');
      wrap.className = 'result-block';
      wrap.innerHTML = `
    <div class="result-header" onclick="toggleCollapse(this, 'result-body')">
      <span class="${isErr ? 'result-err' : 'result-ok'}">${isErr ? '✗' : '✓'}</span>
      <span style="font-size:11px;color:var(--accent);font-weight:600;margin-left:2px">${toolLabel}</span>

    </div>
    <div class="result-body"><pre>${escHtml(content)}</pre></div>`;
      return wrap;
    }

    function toggleCollapse(header, bodyClass = 'tool-body') {
      header.classList.toggle('open');
      header.nextElementSibling.classList.toggle('open');
    }

    function toggleCompactTool(row) {
      row.classList.toggle('open');
      if (row.nextElementSibling) {
        row.nextElementSibling.classList.toggle('open');
      }
    }

    function shortInput(inp) {
      if (!inp) return '';
      const v = Object.values(inp)[0];
      if (typeof v === 'string') return escHtml(v.slice(0, 40) + (v.length > 40 ? '…' : ''));
      return '';
    }

    function createThinkingGroup() {
      const wrap = document.createElement('div');
      wrap.className = 'thinking-block';
      wrap.innerHTML =
        `<div class="thinking-header">` +
        `<span>&#128173; &#24605;&#32771;&#36807;&#31243;</span>` +
        `<span class="thinking-toggle">&#25910;&#36215; &#9650;</span>` +
        `</div>` +
        `<div class="thinking-body"><div class="thinking-content"></div></div>`;
      wrap.querySelector('.thinking-header').addEventListener('click', () => {
        const body = wrap.querySelector('.thinking-body');
        const toggle = wrap.querySelector('.thinking-toggle');
        const collapsed = body.classList.toggle('collapsed');
        toggle.innerHTML = collapsed
          ? '&#23637;&#24320; &#9660;'
          : '&#25910;&#36215; &#9650;';
      });
      return {
        wrap,
        content: wrap.querySelector('.thinking-content'),
        textEl: null,
      };
    }

    function appendThinkingText(group, text) {
      if (!group || !text) return;
      if (group.textEl) return;  // already have text, skip duplicates
      group.textEl = document.createElement('div');
      group.textEl.className = 'thinking-text';
      group.textEl.textContent = text;
      group.content.prepend(group.textEl);
    }

    function ensureThinkingGroup(container) {
      if (!activeThinkingGroup) {
        activeThinkingGroup = createThinkingGroup();
        container.appendChild(activeThinkingGroup.wrap);
      }
      return activeThinkingGroup;
    }

    function renderMessage(container, m) {
      const role = m.role;
      const content = m.content || [];

      if (role === 'user') {
        const text = content.filter(b => b.type === 'text').map(b => b.text).join('\n');
        if (!text) return;
        if (reconcileOptimisticUserMessage(text)) return;
        const el = div('msg user');
        el.innerHTML = `<div class="msg-role">You</div><div class="msg-bubble">${escHtml(text).replace(/\n/g, '<br>')}</div><div class="msg-actions"><button class="msg-act-btn" onclick="copyMessageBubble(this)" title="复制">📋</button></div>`;
        container.appendChild(el);
        return;
      }

      if (role === 'assistant') {
        const textBlocks = content.filter(b => b.type === 'text' && b.text);
        const toolCalls = content.filter(b => b.type === 'tool_call');
        const thinkBlocks = content.filter(b => b.type === 'thinking' && b.thinking);

        if (thinkBlocks.length) {
          activeThinkingGroup = createThinkingGroup();
          container.appendChild(activeThinkingGroup.wrap);
          thinkBlocks.forEach(tb => appendThinkingText(activeThinkingGroup, tb.thinking));
        }

        toolCalls.forEach(tc => {
          if (tc.tool_name === 'think') {
            const thought = (tc.tool_input?.thought || '').trim();
            if (thought) appendThinkingText(ensureThinkingGroup(container), thought);
            return;
          }
          const parent = activeThinkingGroup ? activeThinkingGroup.content : container;
          parent.appendChild(renderToolCall(tc, activeThinkingGroup ? { compact: true } : { defaultOpen: false }));
        });

        if (textBlocks.length) {
          const raw = textBlocks.map(b => b.text).join('\n\n');
          const el = div('msg assistant');
          el.innerHTML = `<div class="msg-role">Assistant</div><div class="msg-bubble">${mdToHtml(raw)}</div><div class="msg-actions"><button class="msg-act-btn" onclick="copyMessageBubble(this)" title="复制">📋</button></div>`;
          container.appendChild(el);
          activeThinkingGroup = null;
        }
        return;
      }

      if (role === 'tool') {
        // Inside a thinking group, tool results are redundant with tool call details — skip them
        if (activeThinkingGroup) return;
        content.filter(b => b.type === 'tool_result').forEach(tr => {
          if (tr.tool_name === 'think') return;
          container.appendChild(renderToolResult(tr, { defaultOpen: false }));
        });
      }
    }

    function renderToolCall(tc, options = {}) {
      const { defaultOpen = false } = options;

      if (options.compact) {
        const inputStr = JSON.stringify(tc.tool_input || {}, null, 2);
        const card = document.createElement('div');
        card.className = 'thinking-tool-card';

          `<div class="tool-body open" style="padding:6px 10px;font-size:12px;color:var(--text);white-space:pre-wrap">${escHtml(task)}</div>`;
        return wrap;
      }

      wrap.className = 'tool-block';

      <span class="tool-icon">&#128295;</span>
      <span class="tool-name">${escHtml(tc.tool_name)}</span>

      <span class="tool-chevron">&#9654;</span>
    </div>
