                  <div class="queue-item-text" title="${escHtml(pc.text)}">${escHtml(pc.text)}</div>
                  <div class="queue-item-meta">消息 · ${time}</div>
                </div>
                <button class="queue-cancel-btn" title="取消" onclick="cancelQueueItem(${pc.index})">✕</button>
              </div>`;
            })
            .join("") + pendingSpawns
            .map((ps) => {
              const time = ps.submitted_at
                ? new Date(ps.submitted_at * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
                : "";
              return `<div class="queue-item">
                <div style="flex:1;min-width:0;">
                  <div class="queue-item-text" title="${escHtml(ps.display_name || ps.task)}">${escHtml(ps.display_name || ps.task)}</div>
                  <div class="queue-item-meta">子代理 · ${time}</div>
                </div>
                <button class="queue-cancel-btn" title="取消" onclick="cancelQueueItem(${ps.index})">✕</button>
              </div>`;
            })
            .join("");
        } else {
          queuePanel.classList.add("hidden");
        }

        // Render only new messages (delta rendering for performance)
        const container = document.getElementById("messages");
        const prevCount = lastMsgCount;
        lastMsgCount = msgs.length;

        for (let i = prevCount; i < msgs.length; i++) {
          try {
            renderMessage(container, msgs[i]);
          } catch (err) {
            console.error(
              "[renderMessage] failed for msg index",
              i,
              msgs[i],
              err,
            );
          }
        }

        // Pending clarifications are rendered separately so we can update
        // them in-place when the user submits an answer.
        renderPendingClarifications(snap);

        // Sync question mode toggle UI with the server's current value
        if (snap.question_mode && snap.question_mode !== currentQuestionMode) {
          currentQuestionMode = snap.question_mode;
          updateModeToggleUI();
        }

        // If new messages were rendered while the engine is still running,
        // the streaming bubble now shows stale text from a completed LLM turn.
        // Reset it so the next LLM turn starts with a fresh streaming bubble.
        if (prevCount < lastMsgCount && snap.is_running && streamEl) {
          streamEl.remove();
          streamEl = null;
          streamText = "";
          streamThinkingText = "";
          streamIsThinking = false;
        }

        // Typing dots
        let dotsEl = document.getElementById("typing-dots");
        if (snap.is_running) {
          if (!dotsEl) {
            dotsEl = document.createElement("div");
            dotsEl.id = "typing-dots";
            dotsEl.className = "typing-dots";
            dotsEl.innerHTML =
              '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            container.appendChild(dotsEl);
          }
        } else if (dotsEl) {
          dotsEl.remove();
        }

        // Scroll to bottom
        container.scrollTop = container.scrollHeight;
      }

      function renderMessage(container, m) {
        const role = m.role;
        const content = m.content || [];

        if (role === "user") {
          const text = content
            .filter((b) => b.type === "text")
            .map((b) => b.text)
            .join("\n");
          if (!text) return;

          // If this message is being edited, render the edit textarea instead
          if (editingMessageId === m.message_id) {
            const wrap = document.createElement("div");
            wrap.className = "msg-edit-wrap";
            wrap.dataset.messageId = m.message_id;
            wrap.innerHTML =
              `<div class="msg-bubble"><textarea id="edit-ta-${m.message_id}" rows="3">${escHtml(text)}</textarea></div>` +
              `<div class="msg-edit-actions">` +
              `<button class="edit-cancel" onclick="cancelEditMessage()">取消</button>` +
              `<button class="edit-submit" id="edit-submit-${m.message_id}" onclick="submitEditMessage('${m.message_id}')">重新生成</button>` +
              `</div>`;
            container.appendChild(wrap);
            const ta = document.getElementById("edit-ta-" + m.message_id);
            if (ta) {
              ta.focus();
              autoGrow(ta);
              ta.addEventListener("input", () => autoGrow(ta));
              ta.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                  e.preventDefault();
                  submitEditMessage(m.message_id);
                }
                if (e.key === "Escape") cancelEditMessage();
              });
            }
            return;
          }

          const el = div("msg user");
          el.dataset.msgId = m.message_id;
          el.innerHTML =
            `<div class="msg-role">You</div>` +
            `<div class="msg-bubble">${escHtml(text).replace(/\n/g, "<br>")}</div>` +
            `<div class="msg-actions">` +
            `<button class="msg-edit-btn" data-msg-id="${m.message_id}" ` +
            `  onclick="startEditMessage('${m.message_id}')">编辑</button>` +
            `</div>`;
          container.appendChild(el);
          return;
        }

        if (role === "assistant") {
          const textBlocks = content.filter((b) => b.type === "text" && b.text);
          const toolCalls = content.filter((b) => b.type === "tool_call");
          const thinkBlocks = content.filter(
            (b) => b.type === "thinking" && b.thinking,
          );

          if (thinkBlocks.length) {
            thinkBlocks.forEach((tb) => {
              const el = document.createElement("div");
              el.className = "thinking-block";
              el.innerHTML =
                `<div class="thinking-header">` +
                `<span>💭 思考过程</span>` +
                `<span style="font-size:11px">(${tb.thinking.length} 字)</span>` +
                `<span class="thinking-toggle">展开 ▼</span>` +
                `</div>` +
                `<div class="thinking-body collapsed">${escHtml(tb.thinking)}</div>`;
              el.querySelector(".thinking-header").addEventListener(
                "click",
                () => {
                  const body = el.querySelector(".thinking-body");
                  const toggle = el.querySelector(".thinking-toggle");
                  const collapsed = body.classList.toggle("collapsed");
                  toggle.textContent = collapsed ? "展开 ▼" : "收起 ▲";
                },
              );
              container.appendChild(el);
            });
          }

          toolCalls.forEach((tc) => {
            container.appendChild(renderToolCall(tc));
          });

          if (textBlocks.length) {
            const raw = textBlocks.map((b) => b.text).join("\n\n");
            const el = div("msg assistant");
            el.innerHTML = `<div class="msg-role">Assistant</div><div class="msg-bubble">${mdToHtml(raw)}</div>`;
            container.appendChild(el);
          }
          return;
        }

        if (role === "tool") {
          content
            .filter((b) => b.type === "tool_result")
            .forEach((tr) => {
              // think tool result is already shown via the tool-call block — skip duplicate
              if (tr.tool_name === "think") return;
              container.appendChild(renderToolResult(tr));
            });
        }
      }

      // ── Edit message ──────────────────────────────────────────────────────
      function startEditMessage(messageId) {
        if (editingMessageId) cancelEditMessage();
        editingMessageId = messageId;

        // Find the user message element and replace it with the edit textarea
        const container = document.getElementById("messages");
        const allUserWrappers = container.querySelectorAll(".msg.user, .msg-edit-wrap");
        for (const el of allUserWrappers) {
          const btn = el.querySelector(".msg-edit-btn");
          const existingId = btn ? btn.dataset.msgId : el.dataset.messageId;
          if (existingId === messageId) {
            const content = el.querySelector(".msg-bubble");
            const text = content ? content.textContent || "" : "";
            // Build the edit wrapper
            const editWrap = document.createElement("div");
            editWrap.className = "msg-edit-wrap";
            editWrap.dataset.messageId = messageId;
            editWrap.innerHTML =
              `<div class="msg-bubble"><textarea id="edit-ta-${messageId}" rows="3">${escHtml(text)}</textarea></div>` +
              `<div class="msg-edit-actions">` +
              `<button class="edit-cancel" onclick="cancelEditMessage()">取消</button>` +
              `<button class="edit-submit" id="edit-submit-${messageId}" onclick="submitEditMessage('${messageId}')">重新生成</button>` +
              `</div>`;
            container.replaceChild(editWrap, el);
            const ta = document.getElementById("edit-ta-" + messageId);
            if (ta) {
              ta.focus();
              autoGrow(ta);
              ta.addEventListener("input", () => autoGrow(ta));
              ta.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                  e.preventDefault();
                  submitEditMessage(messageId);
                }
                if (e.key === "Escape") cancelEditMessage();
              });
            }
            break;
          }
        }
      }

      function cancelEditMessage() {
        if (!editingMessageId) return;
        const msgId = editingMessageId;
        editingMessageId = null;
        // Find the edit wrap and replace it back with a normal user message
        const container = document.getElementById("messages");
        const editWrap = container.querySelector(`.msg-edit-wrap[data-message-id="${msgId}"]`);
        if (editWrap) {
          // We need the message data to re-render — re-fetch the snapshot
          doPoll();
        }
      }

      async function submitEditMessage(messageId) {
        const ta = document.getElementById("edit-ta-" + messageId);
        if (!ta) return;
        const newText = ta.value.trim();
        if (!newText) return;

        const submitBtn = document.getElementById("edit-submit-" + messageId);
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.textContent = "处理中…";
        }

        try {
          editingMessageId = null; // Clear before API call so re-render is clean
          await api(
            `/sessions/${currentSessionId}/messages/${messageId}?re_run=true`,
            "PATCH",
            { text: newText }
          );
          toast("已重新生成");
          triggerPoll();
          if (!ws || ws.readyState !== WebSocket.OPEN) startPolling();
        } catch (e) {
          toast("重新生成失败: " + e.message, true);
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.textContent = "重新生成";
          }
          editingMessageId = messageId; // Restore edit mode on failure
        }
      }

      function renderToolCall(tc) {
        // think tool: render as a collapsible thinking block instead of a generic tool block
        if (tc.tool_name === "think") {
          const thought = (tc.tool_input?.thought || "").trim();
          const wrap = document.createElement("div");
          wrap.className = "thinking-block";
          wrap.innerHTML =
            `<div class="thinking-header">` +
            `<span>💭 思考过程</span>` +
            `<span style="font-size:11px;margin-left:6px;color:var(--text-muted)">(${thought.length} 字)</span>` +
            `<span class="thinking-toggle" style="margin-left:auto">展开 ▼</span>` +
            `</div>` +
            `<div class="thinking-body collapsed" style="white-space:pre-wrap">${escHtml(thought)}</div>`;
          wrap
            .querySelector(".thinking-header")
            .addEventListener("click", () => {
              const body = wrap.querySelector(".thinking-body");
              const toggle = wrap.querySelector(".thinking-toggle");
              const collapsed = body.classList.toggle("collapsed");
              toggle.textContent = collapsed ? "展开 ▼" : "收起 ▲";
            });
          return wrap;
        }

        // spawn_agents: expanded card showing each agent's task
        if (tc.tool_name === "spawn_agents") {
          let agents = tc.tool_input?.agents || [];
          // LLM sometimes serializes the array as a JSON string — parse it back
          if (typeof agents === "string") {
            try {
              agents = JSON.parse(agents);
            } catch {
              agents = [];
            }
          }
          if (!Array.isArray(agents)) agents = [];
          const agentItems = agents
            .map((a, i) => {
              const task = a.task || "";
              return (
                `<div style="padding:5px 0;display:flex;gap:8px;align-items:flex-start;border-bottom:1px solid var(--border)">` +
                `<span style="color:var(--green);font-size:11px;white-space:nowrap;margin-top:2px;min-width:54px">Agent ${i + 1}</span>` +
                `<span style="font-size:12px;color:var(--text)">${escHtml(task.slice(0, 120))}${task.length > 120 ? "…" : ""}</span>` +
                `</div>`
              );
            })
            .join("");
          const wrap = document.createElement("div");
          wrap.className = "tool-block";
          wrap.innerHTML =
            `<div class="tool-header open" onclick="toggleCollapse(this)">` +
            `<span class="tool-icon">🤖</span>` +
            `<span class="tool-name" style="color:var(--green)">spawn_agents</span>` +
            `<span class="tool-summary">${agents.length} 个子代理并行</span>` +
            `<span class="tool-chevron">▶</span>` +
            `</div>` +
            `<div class="tool-body open" style="padding:6px 12px">${agentItems || '<em style="color:var(--text-muted);font-size:12px">（无 agents）</em>'}</div>`;
          return wrap;
        }

        // spawn_agent: expanded card showing the task
        if (tc.tool_name === "spawn_agent") {
          const task = tc.tool_input?.task || "";
          const subMeta = tc.tool_input?.sub_agent_meta || {};
          const displayName = subMeta.display_name || "";
          const agentLabel = displayName || "spawn_agent";
          const wrap = document.createElement("div");
          wrap.className = "tool-block";
          wrap.innerHTML =
            `<div class="tool-header open" onclick="toggleCollapse(this)">` +
            `<span class="tool-icon">🤖</span>` +
            `<span class="tool-name" style="color:var(--green)">${escHtml(agentLabel)}</span>` +
            `<span class="tool-summary">${escHtml(task.slice(0, 60))}${task.length > 60 ? "…" : ""}</span>` +
            `<span class="tool-chevron">▶</span>` +
            `</div>` +
            `<div class="tool-body open" style="padding:8px 12px;font-size:12px;color:var(--text);white-space:pre-wrap">${escHtml(task)}</div>`;
          return wrap;
        }

        const inputStr = JSON.stringify(tc.tool_input || {}, null, 2);
        const wrap = document.createElement("div");
        wrap.className = "tool-block";
        wrap.innerHTML = `
    <div class="tool-header" onclick="toggleCollapse(this)">
      <span class="tool-icon">🔧</span>
      <span class="tool-name">${escHtml(tc.tool_name)}</span>
      <span class="tool-summary">${shortInput(tc.tool_input)}</span>
      <span class="tool-chevron">▶</span>
    </div>
    <div class="tool-body"><pre>${escHtml(inputStr)}</pre></div>`;
        return wrap;
      }

      function renderToolResult(tr) {
        const isErr = tr.is_error;
        const content = tr.content || "";
        const toolLabel = tr.tool_name ? escHtml(tr.tool_name) : "工具结果";
        const preview =
          content.slice(0, 200) + (content.length > 200 ? "…" : "");
        const wrap = document.createElement("div");
        wrap.className = "result-block";
        wrap.innerHTML = `
    <div class="result-header" onclick="toggleCollapse(this, 'result-body')">
      <span class="${isErr ? "result-err" : "result-ok"}">${isErr ? "✗" : "✓"}</span>
      <span style="font-size:11px;color:var(--accent);font-weight:600;margin-left:2px">${toolLabel}</span>
      <span class="result-summary">${escHtml(preview.replace(/\n/g, " "))}</span>
      <span class="tool-chevron" style="margin-left:auto;color:var(--text-muted)">▶</span>
    </div>
    <div class="result-body"><pre>${escHtml(content)}</pre></div>`;
        return wrap;
      }

      function toggleCollapse(header, bodyClass = "tool-body") {
        header.classList.toggle("open");
        header.nextElementSibling.classList.toggle("open");
      }

      function shortInput(inp) {
        if (!inp) return "";
        const v = Object.values(inp)[0];
        if (typeof v === "string")
          return escHtml(v.slice(0, 40) + (v.length > 40 ? "…" : ""));
        return "";
      }

      // ── Config Panel ──────────────────────────────────────────────────────
      function toggleConfig() {
        const panel = document.getElementById("config-panel");
        panel.classList.toggle("open");
        if (panel.classList.contains("open")) buildConfigTree();
      }

      async function buildConfigTree() {
        const tree = document.getElementById("config-tree");
        tree.innerHTML = "";

        // Skills
        tree.appendChild(div("tree-folder", "📁 skills/"));
        try {
          const r = await api("/config/skills");
          (r.skills || []).forEach((s) => {
            const row = treeFileRow(s.name, () =>
              loadConfigFile("skill", s.name),
            );
            row.querySelector(".del-btn").onclick = (e) => {
              e.stopPropagation();
              confirmDeleteConfig("skill", s.name);
            };
            tree.appendChild(row);
          });
        } catch (e) {}
        tree.appendChild(addNewRow("skill"));

        // Personas
        tree.appendChild(div("tree-folder", "📁 personas/"));
        try {
          const r = await api("/config/personas");
          (r.personas || []).forEach((p) => {
            const name = typeof p === "string" ? p : p.name;
            const row = treeFileRow(name, () =>
              loadConfigFile("persona", name),
            );
            row.querySelector(".del-btn").onclick = (e) => {
              e.stopPropagation();
              confirmDeleteConfig("persona", name);
            };
            tree.appendChild(row);
          });
        } catch (e) {}
        tree.appendChild(addNewRow("persona"));

        // config.yaml
        tree.appendChild(div("tree-folder", "📄 config.yaml"));
        const yamlRow = treeFileRow("config.yaml", () =>
          loadConfigFile("yaml", "config.yaml"),
        );
        yamlRow.querySelector(".del-btn").remove();
        tree.appendChild(yamlRow);
      }

      function treeFileRow(name, onclick) {
        const row = document.createElement("div");
        row.className = "tree-file";
        row.innerHTML = `<span>📄 ${escHtml(name)}</span><span class="del-btn" title="删除">✕</span>`;
        row.addEventListener("click", onclick);
        return row;
      }

      function addNewRow(type) {
        const wrap = div("tree-new");
        const inp = document.createElement("input");
        inp.type = "text";
        inp.placeholder = "新建名称…";
        const btn = div("", "＋");
        btn.className = "btn btn-sm btn-primary";
        btn.style.padding = "2px 8px";
        btn.onclick = async () => {
          const name = inp.value.trim();
          if (!name) return;
          const tmpl =
            type === "skill"
              ? `---\nname: ${name}\ndescription: "${name}"\nprovider: bltcy-anthropic\ntask_goal: ""\ntools:\n  - read_file\n  - search\n---\n\n你是一个...`
              : "你是一个...\n\n回答时用中文。";
          try {
            if (type === "skill")
              await api("/config/skills", "POST", { name, content: tmpl });
            else await api("/config/personas", "POST", { name, content: tmpl });
            toast(`${name} 已创建`);
            inp.value = "";
            buildConfigTree();
            await loadConfigFile(type, name);
            await loadOverview();
          } catch (e) {
            toast(e.message, true);
          }
        };
        wrap.appendChild(inp);
        wrap.appendChild(btn);
        return wrap;
      }

      async function loadConfigFile(type, name) {
        // Highlight active
        document.querySelectorAll(".tree-file").forEach((el) => {
          const txt = el.querySelector("span")?.textContent;
          el.classList.toggle(
            "active",
            txt === `📄 ${name}` || txt === `📄 ${name}`,
          );
        });

        currentConfigFile = { type, name };
        document.getElementById("config-filename").textContent =
          type === "yaml"
            ? "config.yaml"
            : `${type === "skill" ? "skills" : "personas"}/${name}.md`;
        document.getElementById("config-filename").style.color =
          "var(--accent)";
        document.getElementById("config-editor").disabled = false;
        document.getElementById("config-save-btn").disabled = false;
        document.getElementById("config-del-btn").disabled = type === "yaml";
        document.getElementById("config-status").textContent = "";

        try {
          let r;
          if (type === "skill") r = await api(`/config/skills/${name}`);
          else if (type === "persona")
            r = await api(`/config/personas/${name}`);
          else r = await api("/config/yaml");
          document.getElementById("config-editor").value = r.content || "";
        } catch (e) {
          toast("加载失败: " + e.message, true);
        }
      }

      async function saveConfigFile() {
        if (!currentConfigFile) return;
        const { type, name } = currentConfigFile;
        const content = document.getElementById("config-editor").value;
        try {
          if (type === "skill")
            await api(`/config/skills/${name}`, "PUT", { content });
          else if (type === "persona")
            await api(`/config/personas/${name}`, "PUT", { content });
          else await api("/config/yaml", "PUT", { content });
          document.getElementById("config-status").textContent = "✓ 已保存";
          setTimeout(
            () => (document.getElementById("config-status").textContent = ""),
            2000,
          );
          await loadOverview();
          await buildConfigTree();
        } catch (e) {
          toast("保存失败: " + e.message, true);
        }
      }

      async function confirmDeleteConfig(type, name) {
        if (!confirm(`确认删除 ${name}？`)) return;
        try {
          if (type === "skill") await api(`/config/skills/${name}`, "DELETE");
          else await api(`/config/personas/${name}`, "DELETE");
          toast(`${name} 已删除`);
          currentConfigFile = null;
          document.getElementById("config-editor").value = "";
          document.getElementById("config-editor").disabled = true;
          document.getElementById("config-save-btn").disabled = true;
          document.getElementById("config-del-btn").disabled = true;
          document.getElementById("config-filename").textContent =
            "← 选择文件编辑";
          document.getElementById("config-filename").style.color =
            "var(--text-muted)";
          await loadOverview();
          buildConfigTree();
        } catch (e) {
          toast("删除失败: " + e.message, true);
        }
      }

      async function deleteConfigFile() {
        if (!currentConfigFile || currentConfigFile.type === "yaml") return;
        confirmDeleteConfig(currentConfigFile.type, currentConfigFile.name);
      }

      // ── Utilities ─────────────────────────────────────────────────────────
      async function api(path, method = "GET", body = null) {
        const opts = { method, headers: {} };
        if (body !== null) {
          opts.headers["Content-Type"] = "application/json";
          opts.body = JSON.stringify(body);
        }
        const r = await fetch(path, opts);
        if (r.status === 204) return null;
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || r.statusText);
        return data;
      }

      function div(cls, text = "") {
        const el = document.createElement("div");
        if (cls) el.className = cls;
        if (text) el.textContent = text;
        return el;
      }

      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function mdToHtml(md) {
        // Very light markdown: bold, inline code, code blocks, lists
        let h = escHtml(md);
        // code blocks
        h = h.replace(/```[\w]*\n([\s\S]*?)```/g, "<pre><code>$1</code></pre>");
        // inline code
        h = h.replace(/`([^`]+)`/g, "<code>$1</code>");
        // bold
        h = h.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
        // headers
        h = h.replace(/^### (.*?)$/gm, "<strong>$1</strong>");
        h = h.replace(
          /^## (.*?)$/gm,
          '<strong style="font-size:1.05em">$1</strong>',
        );
        h = h.replace(
          /^# (.*?)$/gm,
          '<strong style="font-size:1.1em">$1</strong>',
        );
        // unordered list
        h = h.replace(/^[- *] (.*?)$/gm, "<li>$1</li>");
        h = h.replace(/(<li>.*<\/li>)/s, "<ul>$1</ul>");
        // line breaks → paragraphs
        h = h
          .split("\n\n")
          .map((p) => `<p>${p.replace(/\n/g, "<br>")}</p>`)
          .join("");
        return h;
      }

      function toast(msg, isErr = false) {
        const el = document.createElement("div");
        el.className = "toast " + (isErr ? "toast-err" : "toast-ok");
        el.textContent = msg;
        document.getElementById("toasts").appendChild(el);
        setTimeout(() => el.remove(), 3000);
      }

      // Close modal on overlay click
      document
        .getElementById("modal-overlay")
        .addEventListener("click", (e) => {
          if (e.target === e.currentTarget) closeModal();
        });

      // ── Start ──────────────────────────────────────────────────────────────
      boot();
    </script>
  </body>
</html>
